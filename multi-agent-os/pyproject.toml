[tool.ruff]
target-version = "py312"
line-length = 110
select = ["E", "F", "B", "I", "N", "UP", "S", "C4"]
ignore = ["S101", "S311", "B008", "N818"]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
strict = false

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
