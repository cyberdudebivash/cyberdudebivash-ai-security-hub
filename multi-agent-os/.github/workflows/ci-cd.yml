# CYBERDUDEBIVASH® MACOS — GitHub Actions CI/CD Pipeline
name: CI/CD — MACOS Platform

on:
  push:
    branches: [main, develop]
    paths: ["multi-agent-os/**"]
  pull_request:
    branches: [main]
    paths: ["multi-agent-os/**"]

env:
  PYTHON_VERSION: "3.12"
  IMAGE_REGISTRY: ghcr.io
  IMAGE_NAME:     cyberdudebivash/cdb-macos-api

jobs:
  # ── Lint + Security Scan ───────────────────────────────────────────────────
  lint:
    name: Lint & Security Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: multi-agent-os
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dev dependencies
        run: pip install ruff mypy bandit safety

      - name: Ruff lint
        run: ruff check . --output-format=github

      - name: Bandit security scan
        run: bandit -r . -ll -x tests/ -f json -o bandit-report.json || true

      - name: Safety dependency scan
        run: safety check --policy-file .safety-policy.yml || true

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: multi-agent-os/bandit-report.json

  # ── Tests ──────────────────────────────────────────────────────────────────
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: multi-agent-os
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       cdb_macos_test
          POSTGRES_USER:     cdb
          POSTGRES_PASSWORD: cdb_test
        ports: [5432:5432]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-retries 5
      redis:
        image: redis:7.2-alpine
        ports: [6379:6379]
        options: --health-cmd "redis-cli ping" --health-interval 10s
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio pytest-cov

      - name: Run tests
        env:
          DATABASE_URL: postgresql://cdb:cdb_test@localhost:5432/cdb_macos_test
          REDIS_URL:    redis://localhost:6379/0
          ENVIRONMENT:  test
        run: |
          pytest tests/ -v \
            --cov=. --cov-report=xml \
            --cov-fail-under=70 \
            -x

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: multi-agent-os/coverage.xml

  # ── Build + Push Docker Image ─────────────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context:    multi-agent-os
          file:       multi-agent-os/deploy/Dockerfile
          push:       true
          tags: |
            ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          build-args: |
            BUILD_SHA=${{ github.sha }}

  # ── Deploy to Staging ─────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy — Staging
    runs-on: ubuntu-latest
    needs: build
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to K8s staging
        run: |
          kubectl set image deployment/cdb-macos-api \
            api=${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -n cdb-staging
          kubectl rollout status deployment/cdb-macos-api -n cdb-staging --timeout=300s

  # ── Deploy to Production ──────────────────────────────────────────────────
  deploy-production:
    name: Deploy — Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to K8s production
        run: |
          kubectl set image deployment/cdb-macos-api \
            api=${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -n cdb-production
          kubectl rollout status deployment/cdb-macos-api -n cdb-production --timeout=300s
