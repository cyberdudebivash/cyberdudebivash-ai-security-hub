# CYBERDUDEBIVASH® MACOS — OpenTelemetry Collector Configuration
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
  resource:
    attributes:
      - key: service.team
        value: "cdb-platform"
        action: upsert
      - key: deployment.environment
        from_attribute: ENVIRONMENT
        action: insert

exporters:
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: cdb_macos
  logging:
    loglevel: warn
  # Add Jaeger or other tracing backend here if needed
  # jaeger:
  #   endpoint: jaeger:14250

service:
  pipelines:
    traces:
      receivers:  [otlp]
      processors: [memory_limiter, batch, resource]
      exporters:  [logging]
    metrics:
      receivers:  [otlp]
      processors: [memory_limiter, batch]
      exporters:  [prometheus]
    logs:
      receivers:  [otlp]
      processors: [memory_limiter, batch]
      exporters:  [logging]
