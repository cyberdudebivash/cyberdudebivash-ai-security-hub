# CYBERDUDEBIVASH® MACOS — Prometheus Configuration
global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    platform: cdb-macos

scrape_configs:
  - job_name: cdb-macos-api
    static_configs:
      - targets: [macos-api:8000]
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: otel-collector
    static_configs:
      - targets: [otel-collector:8889]

  - job_name: redis
    static_configs:
      - targets: [redis:6379]

  - job_name: postgres
    static_configs:
      - targets: [postgres:5432]

  - job_name: qdrant
    static_configs:
      - targets: [qdrant:6333]
    metrics_path: /metrics

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "alerts/*.yml"
