<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketplace Checkout — CYBERDUDEBIVASH® SENTINEL APEX</title>
<meta name="description" content="Purchase detection packs, AI security agents, intelligence reports, compliance kits and playbooks from CYBERDUDEBIVASH® SENTINEL APEX marketplace.">
<meta name="robots" content="noindex">
<script type="module" src="/assets/js/seo-schema.js"></script>
<style>
  :root {
    --bg: #060b14; --surface: #0c1422; --surface2: #111827;
    --border: #1a2840; --accent: #00c2ff; --accent2: #7c3aed;
    --green: #10b981; --yellow: #f59e0b; --red: #ef4444;
    --text: #e2e8f0; --muted: #64748b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; }

  header {
    background: rgba(6,11,20,0.95); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border); padding: 1rem 2rem;
    display: flex; align-items: center; justify-content: space-between;
  }
  .logo { font-size: 0.7rem; font-weight: 700; color: var(--accent); letter-spacing: 0.12em; }
  .back-link { font-size: 0.8rem; color: var(--muted); text-decoration: none; }
  .back-link:hover { color: var(--text); }

  main { max-width: 1000px; margin: 0 auto; padding: 2rem; display: grid; grid-template-columns: 1fr 380px; gap: 2rem; align-items: start; }

  /* Product panel */
  .product-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
  .product-header { padding: 1.75rem; border-bottom: 1px solid var(--border); background: linear-gradient(135deg, rgba(0,194,255,0.05) 0%, rgba(124,58,237,0.05) 100%); }
  .category-tag { display: inline-block; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; padding: 0.25rem 0.7rem; border-radius: 4px; margin-bottom: 0.75rem; background: rgba(0,194,255,0.1); color: var(--accent); border: 1px solid rgba(0,194,255,0.2); }
  .product-name { font-size: 1.3rem; font-weight: 700; margin-bottom: 0.5rem; line-height: 1.2; }
  .product-tagline { font-size: 0.85rem; color: var(--muted); line-height: 1.5; }
  .product-body { padding: 1.5rem; }
  .product-section { margin-bottom: 1.5rem; }
  .product-section h4 { font-size: 0.75rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.6rem; }
  .product-desc { font-size: 0.82rem; color: #94a3b8; line-height: 1.6; }
  .format-chips { display: flex; flex-wrap: wrap; gap: 0.4rem; }
  .chip { padding: 0.25rem 0.6rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; font-size: 0.7rem; color: var(--muted); font-family: monospace; }
  .mitre-chips { display: flex; flex-wrap: wrap; gap: 0.4rem; }
  .mitre-chip { padding: 0.25rem 0.6rem; background: rgba(124,58,237,0.1); border: 1px solid rgba(124,58,237,0.25); border-radius: 4px; font-size: 0.68rem; color: #a78bfa; }
  .stat-row { display: flex; gap: 1.5rem; }
  .stat-item { text-align: center; }
  .stat-num { font-size: 1.4rem; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: 0.65rem; color: var(--muted); margin-top: 0.1rem; }

  /* Checkout card */
  .checkout-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; position: sticky; top: 80px; }
  .checkout-header { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border); background: linear-gradient(135deg, rgba(0,194,255,0.06), rgba(124,58,237,0.06)); }
  .price-display { display: flex; align-items: baseline; gap: 0.5rem; }
  .price-inr { font-size: 2rem; font-weight: 800; color: var(--text); }
  .price-usd { font-size: 0.82rem; color: var(--muted); }
  .price-one-time { font-size: 0.72rem; color: var(--green); margin-top: 0.2rem; }
  .checkout-body { padding: 1.5rem; }
  label { display: block; font-size: 0.75rem; font-weight: 500; color: var(--muted); margin-bottom: 0.4rem; margin-top: 0.85rem; }
  label:first-child { margin-top: 0; }
  input[type=text], input[type=email] {
    width: 100%; padding: 0.7rem 0.9rem; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 0.85rem; transition: border-color 0.2s;
  }
  input:focus { outline: none; border-color: var(--accent); }
  input.err { border-color: var(--red); }
  .err-msg { display: none; font-size: 0.72rem; color: var(--red); margin-top: 0.3rem; }
  .err-msg.show { display: block; }

  .btn-pay {
    width: 100%; padding: 1rem; margin-top: 1.25rem;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #000; border: none; border-radius: 10px; font-size: 0.95rem; font-weight: 800;
    cursor: pointer; transition: opacity 0.2s; letter-spacing: 0.02em;
  }
  .btn-pay:hover { opacity: 0.9; }
  .btn-pay:disabled { opacity: 0.5; cursor: not-allowed; }

  .payment-methods { display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; margin-top: 0.75rem; }
  .pm { font-size: 0.68rem; color: var(--muted); padding: 0.2rem 0.5rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; }

  .trust-row { display: flex; flex-direction: column; gap: 0.4rem; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); }
  .trust-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.72rem; color: var(--muted); }

  /* Success state */
  .success-panel { display: none; text-align: center; padding: 2rem; }
  .success-panel.show { display: block; }
  .success-icon { font-size: 3rem; margin-bottom: 1rem; }
  .success-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; color: var(--green); }
  .success-msg { font-size: 0.82rem; color: var(--muted); line-height: 1.6; margin-bottom: 1.25rem; }
  .access-token-box { background: var(--surface2); border: 1px solid var(--green); border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
  .access-token-label { font-size: 0.68rem; color: var(--green); font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.35rem; }
  .access-token-val { font-family: monospace; font-size: 0.75rem; word-break: break-all; color: var(--text); }
  .btn-download { display: block; width: 100%; padding: 0.85rem; background: var(--green); color: #000; border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 700; cursor: pointer; text-decoration: none; text-align: center; margin-bottom: 0.5rem; }
  .btn-purchases { display: block; width: 100%; padding: 0.75rem; background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 8px; font-size: 0.82rem; cursor: pointer; text-decoration: none; text-align: center; }

  /* Loading skeleton */
  .skeleton { background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%); background-size: 200%; animation: shimmer 1.5s infinite; border-radius: 6px; }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  .loading-product { padding: 2rem; }
  .sk-h1 { height: 28px; width: 80%; margin-bottom: 1rem; }
  .sk-p { height: 14px; margin-bottom: 0.5rem; }
  .sk-p.w60 { width: 60%; }
  .sk-p.w80 { width: 80%; }

  /* z-index above the consent banner seo-schema.js injects (2147483000) —
     an error toast (e.g. "Payment SDK failed to load") must stay visible
     even while the full-width, bottom-anchored cookie banner is showing. */
  .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 0.75rem 1.25rem; border-radius: 8px; font-size: 0.82rem; z-index: 2147483001; transform: translateY(60px); opacity: 0; transition: all 0.3s; }
  .toast.show { transform: translateY(0); opacity: 1; }

  @media (max-width: 768px) {
    main { grid-template-columns: 1fr; padding: 1rem; }
    .checkout-card { position: static; }
  }
</style>
<!-- CDB UX layer (auto-injected, zero-regression) -->
  <link rel="stylesheet" href="/assets/cdb-ui-polish.css">
  <link rel="stylesheet" href="/assets/cdb-mobile-responsive.css">
  <link rel="stylesheet" href="/assets/cdb-ux-upgrade.css">
</head>
<body>

<header>
  <span class="logo">CYBERDUDEBIVASH® SENTINEL APEX — MARKETPLACE</span>
  <a href="/sentinel-apex-marketplace.html" class="back-link">← Back to Marketplace</a>
</header>

<main>

  <!-- Product details -->
  <div class="product-panel" id="productPanel">
    <div class="loading-product">
      <div class="skeleton sk-h1"></div>
      <div class="skeleton sk-p w80"></div>
      <div class="skeleton sk-p w60"></div>
      <div class="skeleton sk-p w80" style="margin-top:1rem;height:80px;"></div>
    </div>
  </div>

  <!-- Checkout card -->
  <div class="checkout-card">
    <div class="checkout-header" id="checkoutHeader">
      <div class="skeleton" style="height:40px;width:60%;margin-bottom:0.5rem;"></div>
      <div class="skeleton" style="height:14px;width:40%;"></div>
    </div>
    <div class="checkout-body" id="checkoutBody">
      <div style="text-align:center;padding:2rem;color:var(--muted);font-size:0.82rem;">Loading product…</div>
    </div>

    <!-- Success panel (hidden until payment verified) -->
    <div class="success-panel" id="successPanel">
      <div class="success-icon">✅</div>
      <div class="success-title">Payment Successful!</div>
      <div class="success-msg" id="successMsg">Your purchase is confirmed. Access your product below.</div>
      <div class="access-token-box">
        <div class="access-token-label">Access Token — save this</div>
        <div class="access-token-val" id="accessTokenDisplay"></div>
      </div>
      <a id="downloadBtn" href="#" class="btn-download">⬇ Download / Access Product</a>
      <a href="/customer-dashboard.html" class="btn-purchases">View My Purchases →</a>
    </div>
  </div>

</main>

<div class="toast" id="toast"></div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
const API = '';
const urlParams = new URLSearchParams(window.location.search);
const productId = urlParams.get('product');

let productData = null;
let purchaseId = null;
let razorOrderId = null;
let checkoutEmail = null;

async function loadProduct() {
  if (!productId) {
    document.getElementById('productPanel').innerHTML = '<div style="padding:2rem;color:var(--red);">No product specified. <a href="/sentinel-apex-marketplace.html" style="color:var(--accent);">Browse marketplace →</a></div>';
    return;
  }

  try {
    const r = await fetch(`${API}/api/marketplace/catalog/${encodeURIComponent(productId)}`);
    if (!r.ok) throw new Error('Product not found');
    productData = await r.json();
    renderProduct();
    renderCheckout();
  } catch (e) {
    document.getElementById('productPanel').innerHTML = `<div style="padding:2rem;color:var(--red);">Product not found. <a href="/sentinel-apex-marketplace.html" style="color:var(--accent);">Browse marketplace →</a></div>`;
  }
}

function fmt(n) { return (n / 100).toLocaleString('en-IN'); }

// The catalog's own `delivery: 'instant'` field is aspirational, not real,
// for detection_pack/playbook — the actual /api/marketplace/download handler
// (workers/src/handlers/marketplaceCheckoutHandler.js) has no rule/playbook-
// authoring engine yet and routes those two categories to manual fulfillment
// within 24h regardless of what the catalog's `delivery` field says.
// Checked by `category` only (not `delivery`) because the two callers of
// this function see different response shapes: productData (from
// /api/marketplace/catalog/:id) has both `category` and `delivery`, but the
// verify response's `product` field only ever includes `category` — and
// category maps 1:1 with delivery in this catalog anyway (ai_agent is
// always delivery:'api_key').
function isInstantDelivery(p) {
  return p.category === 'ai_agent' || p.category === 'intelligence_report' || p.category === 'compliance_pack';
}

function renderProduct() {
  const p = productData;
  const catColors = {
    detection_pack: '#00c2ff', playbook: '#10b981',
    intelligence_report: '#f59e0b', compliance_pack: '#7c3aed', ai_agent: '#ef4444',
  };
  const catColor = catColors[p.category] || '#00c2ff';

  let statsHtml = '';
  if (p.rule_count) statsHtml += `<div class="stat-item"><div class="stat-num">${p.rule_count}</div><div class="stat-label">Detection Rules</div></div>`;
  if (p.license_days) statsHtml += `<div class="stat-item"><div class="stat-num">${p.license_days}</div><div class="stat-label">Day License</div></div>`;
  const deliveryIcon  = p.delivery === 'api_key' ? '🔑' : isInstantDelivery(p) ? '⚡' : '📧';
  const deliveryLabel = p.delivery === 'api_key' ? 'API Key' : isInstantDelivery(p) ? 'Instant' : '24-Hour';
  statsHtml += `<div class="stat-item"><div class="stat-num">${deliveryIcon}</div><div class="stat-label">${deliveryLabel} Delivery</div></div>`;

  const mitreHtml = p.mitre_coverage?.length
    ? `<div class="product-section"><h4>MITRE ATT&CK Coverage</h4><div class="mitre-chips">${p.mitre_coverage.map(t => `<span class="mitre-chip">${t}</span>`).join('')}</div></div>` : '';

  document.getElementById('productPanel').innerHTML = `
    <div class="product-header">
      <span class="category-tag" style="background:rgba(${hexToRgb(catColor)},0.1);color:${catColor};border-color:rgba(${hexToRgb(catColor)},0.25);">${p.category_label}</span>
      ${p.badge ? `<span style="margin-left:0.5rem;font-size:0.65rem;font-weight:700;padding:0.2rem 0.5rem;border-radius:4px;background:rgba(245,158,11,0.15);color:#f59e0b;border:1px solid rgba(245,158,11,0.3);">${p.badge}</span>` : ''}
      <div class="product-name">${p.name}</div>
      <div class="product-tagline">${p.tagline}</div>
    </div>
    <div class="product-body">
      <div class="product-section">
        <div class="stat-row">${statsHtml}</div>
      </div>
      <div class="product-section">
        <h4>Description</h4>
        <p class="product-desc">${p.description}</p>
      </div>
      ${mitreHtml}
      <div class="product-section">
        <h4>Delivered Formats</h4>
        <div class="format-chips">${(p.format || []).map(f => `<span class="chip">.${f}</span>`).join('')}</div>
      </div>
      <div class="product-section">
        <h4>Last Updated</h4>
        <p style="font-size:0.8rem;color:var(--muted);">${p.updated || '2025'}</p>
      </div>
    </div>
  `;
}

function renderCheckout() {
  const p = productData;
  document.getElementById('checkoutHeader').innerHTML = `
    <div class="price-display">
      <span class="price-inr">₹${fmt(p.amount)}</span>
      <span class="price-usd">/ $${(p.amount_usd / 100).toFixed(0)}</span>
    </div>
    <div class="price-one-time">One-time purchase · ${isInstantDelivery(p) ? 'Instant delivery' : 'Delivered within 24 hours'}</div>
  `;
  document.getElementById('checkoutBody').innerHTML = `
    <label for="c-name">Full name <span style="color:var(--red)">*</span></label>
    <input type="text" id="c-name" placeholder="Bivash Kumar" autocomplete="name">
    <div class="err-msg" id="err-name">Name is required.</div>

    <label for="c-email">Email address <span style="color:var(--red)">*</span></label>
    <input type="email" id="c-email" placeholder="you@company.com" autocomplete="email">
    <div class="err-msg" id="err-email">Valid email required.</div>

    <button class="btn-pay" id="payBtn" onclick="initiatePayment()">
      Pay ₹${fmt(p.amount)} — ${p.name.slice(0, 30)}
    </button>

    <div class="payment-methods">
      <span class="pm">💳 Card</span>
      <span class="pm">📱 UPI</span>
      <span class="pm">🏦 Net Banking</span>
      <span class="pm">📋 EMI</span>
    </div>

    <div class="trust-row">
      <div class="trust-item">🔒 256-bit TLS encryption</div>
      <div class="trust-item">✅ Razorpay certified payment</div>
      <div class="trust-item">📄 Invoice sent automatically</div>
      <div class="trust-item">🛡️ 100% refund if not delivered</div>
    </div>
  `;
}

async function initiatePayment() {
  const name = document.getElementById('c-name')?.value.trim() || '';
  const email = document.getElementById('c-email')?.value.trim() || '';

  document.querySelectorAll('.err-msg').forEach(e => e.classList.remove('show'));
  let valid = true;
  if (name.length < 2) { document.getElementById('err-name').classList.add('show'); valid = false; }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(email)) { document.getElementById('err-email').classList.add('show'); valid = false; }
  if (!valid) return;

  const btn = document.getElementById('payBtn');
  btn.disabled = true;
  btn.textContent = 'Creating secure order…';

  try {
    const r = await fetch(`${API}/api/marketplace/checkout`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ product_id: productId, email, name }),
    });
    const data = await r.json();

    if (!r.ok) {
      btn.disabled = false;
      btn.textContent = `Pay ₹${fmt(productData.amount)}`;
      showToast('❌ ' + (data.error || 'Failed to create order'), 'red');
      return;
    }

    purchaseId = data.purchase_id;
    razorOrderId = data.order_id;
    checkoutEmail = email;

    if (!window.Razorpay) {
      showToast('❌ Payment SDK failed to load. Please refresh.', 'red');
      btn.disabled = false;
      return;
    }

    const rzp = new window.Razorpay({
      key: data.razorpay_key,
      order_id: data.order_id,
      amount: data.product.amount,
      currency: data.product.currency || 'INR',
      name: 'CYBERDUDEBIVASH® SENTINEL APEX',
      description: data.product.name,
      image: '/og-image.png',
      prefill: { name: data.prefill.name, email: data.prefill.email },
      theme: { color: '#00c2ff' },
      handler: async function(response) {
        btn.textContent = 'Verifying payment…';
        await verifyPayment(response);
      },
      modal: {
        ondismiss: function() {
          btn.disabled = false;
          btn.textContent = `Pay ₹${fmt(productData.amount)}`;
        }
      }
    });
    rzp.open();

  } catch (e) {
    btn.disabled = false;
    btn.textContent = `Pay ₹${fmt(productData.amount)}`;
    showToast('❌ Network error. Please try again.', 'red');
  }
}

async function verifyPayment(rzpResponse) {
  try {
    const r = await fetch(`${API}/api/marketplace/verify`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({
        razorpay_order_id: rzpResponse.razorpay_order_id,
        razorpay_payment_id: rzpResponse.razorpay_payment_id,
        razorpay_signature: rzpResponse.razorpay_signature,
        purchase_id: purchaseId,
      }),
    });
    const data = await r.json();

    if (!r.ok) {
      showToast('⚠ Payment received but verification failed. Contact support@cyberdudebivash.in', 'yellow');
      return;
    }

    // handleMarketplaceVerify's "already verified" branch (a legitimate,
    // reachable response if Razorpay's handler fires twice, or a client
    // retries after a dropped response for a payment the server already
    // processed) returns only {message, access_token, download_url} — no
    // `product`/`access_expires_at`. Fall back to the product already
    // fetched by loadProduct() rather than assume the richer shape.
    const product = data.product || productData;

    // Show success state
    document.getElementById('checkoutBody').style.display = 'none';
    document.getElementById('checkoutHeader').style.display = 'none';
    const sp = document.getElementById('successPanel');
    sp.classList.add('show');
    document.getElementById('accessTokenDisplay').textContent = data.access_token;
    const readyNow = isInstantDelivery(product);
    const expiryText = data.access_expires_at ? ` Access expires ${new Date(data.access_expires_at).toLocaleDateString()}.` : '';
    document.getElementById('successMsg').textContent = readyNow
      ? `Your ${product.name} is ready.${expiryText}`
      : `Your order for ${product.name} is confirmed — our research team will finalize and email it to you within 24 hours.${expiryText}`;
    document.getElementById('downloadBtn').href = data.download_url;

    try {
      window.cdbGoogleCustomerReviewsOptIn && window.cdbGoogleCustomerReviewsOptIn({
        orderId: rzpResponse.razorpay_payment_id, email: checkoutEmail,
        // See isInstantDelivery() above — detection_pack/playbook are
        // manually fulfilled within 24h regardless of catalog metadata.
        estimatedDeliveryDate: window.cdbEstimatedDeliveryDate(isInstantDelivery(product) ? 0 : 1),
      });
    } catch (e) {}

  } catch (e) {
    showToast('⚠ Verification error. Contact support@cyberdudebivash.in with order ID: ' + razorOrderId, 'yellow');
  }
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

function showToast(msg, type = 'green') {
  const colors = { green: 'var(--green)', red: 'var(--red)', yellow: 'var(--yellow)' };
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.borderColor = colors[type]; t.style.color = colors[type];
  t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 5000);
}

loadProduct();
</script>
<script src="/assets/copilot-widget.js" defer></script>
</body>
</html>
