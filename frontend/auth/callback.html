<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signing you in — CYBERDUDEBIVASH AI Security Hub</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f1a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      text-align: center;
      padding: 48px 40px;
      background: #1a1a2e;
      border: 1px solid #2d2d4e;
      border-radius: 16px;
      max-width: 420px;
      width: 90%;
    }
    .logo {
      font-size: 22px;
      font-weight: 900;
      background: linear-gradient(135deg, #7c3aed, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .sub { font-size: 12px; color: #64748b; margin-bottom: 32px; }
    .spinner {
      width: 48px; height: 48px;
      border: 3px solid #2d2d4e;
      border-top-color: #7c3aed;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status { font-size: 15px; color: #94a3b8; margin-bottom: 8px; }
    .detail { font-size: 12px; color: #475569; }
    .success-icon { font-size: 48px; margin-bottom: 16px; }
    .error-box {
      background: #1e1215;
      border: 1px solid #7f1d1d;
      border-radius: 8px;
      padding: 16px;
      font-size: 13px;
      color: #fca5a5;
      margin-top: 16px;
    }
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 24px;
      background: #7c3aed;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="logo">CYBERDUDEBIVASH®</div>
    <div class="sub">AI Security Intelligence Platform</div>
    <div class="spinner" id="spinner"></div>
    <div class="status" id="status">Completing Google Sign-In…</div>
    <div class="detail" id="detail">Verifying your identity and setting up your session</div>
  </div>

  <script>
    (function() {
      const $status = document.getElementById('status');
      const $detail = document.getElementById('detail');
      const $spinner = document.getElementById('spinner');
      const $card = document.getElementById('card');

      function showError(msg, detail) {
        $spinner.style.display = 'none';
        $card.innerHTML = `
          <div class="logo">CYBERDUDEBIVASH®</div>
          <div class="sub">AI Security Intelligence Platform</div>
          <div class="success-icon">⚠️</div>
          <div class="status" style="color:#fca5a5">Sign-in failed</div>
          <div class="error-box">${msg}${detail ? '<br><br>' + detail : ''}</div>
          <a class="btn" href="/">Try again</a>
        `;
      }

      function showSuccess(tier, email) {
        $spinner.style.display = 'none';
        $status.textContent = 'Signed in successfully!';
        $status.style.color = '#22c55e';
        $detail.textContent = `Welcome${email ? ', ' + email : ''}. Redirecting to your dashboard…`;
        $card.insertAdjacentHTML('afterbegin', '<div class="success-icon">✅</div>');
      }

      // Parse URL fragment: #access_token=...&refresh_token=...&tier=...&sso=google
      const hash = window.location.hash.slice(1);
      if (!hash) {
        // Check query string fallback (for error redirect from backend)
        const params = new URLSearchParams(window.location.search);
        const reason = params.get('reason') || 'unknown_error';
        showError('Google Sign-In was cancelled or failed.', 'Reason: ' + reason);
        return;
      }

      const params = new URLSearchParams(hash);
      const accessToken  = params.get('access_token');
      const refreshToken = params.get('refresh_token');
      const tier         = params.get('tier') || 'FREE';
      const sso          = params.get('sso');

      if (!accessToken) {
        showError('No access token received from Google Sign-In.', 'Please try again.');
        return;
      }

      // Decode JWT to get email (no signature verify needed — backend already did that)
      let email = '';
      try {
        const payload = JSON.parse(atob(accessToken.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
        email = payload.email || payload.sub || '';
      } catch (_) {}

      // Store tokens using the same keys the rest of the frontend uses
      try {
        localStorage.setItem('cdb_token', accessToken);
        localStorage.setItem('cdb_tier', tier);
        if (email) localStorage.setItem('cdb_email', email);
        if (refreshToken) sessionStorage.setItem('cdb_refresh', refreshToken);
        // Mark SSO session for UI hint
        if (sso) sessionStorage.setItem('cdb_sso', sso);
      } catch (e) {
        showError('Could not save your session. Check browser storage settings.', e.message);
        return;
      }

      // Clear the fragment so tokens don't appear in browser history
      history.replaceState(null, '', window.location.pathname);

      showSuccess(tier, email);

      // Redirect after short delay — go to dashboard if PRO/ENTERPRISE, otherwise homepage
      const dest = ['PRO', 'ENTERPRISE', 'MSSP'].includes(tier)
        ? '/user-dashboard.html'
        : '/';

      setTimeout(() => { window.location.href = dest; }, 1200);
    })();
  </script>
</body>
</html>
