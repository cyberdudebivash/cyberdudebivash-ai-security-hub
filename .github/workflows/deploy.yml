name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  deploy-workers:
    name: Deploy Cloudflare Workers API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Install Wrangler
        run: cd workers && npm install
      - name: Set KV Namespace ID
        run: |
          sed -i "s/REPLACE_WITH_YOUR_KV_NAMESPACE_ID/${{ secrets.WORKERS_KV_NAMESPACE_ID }}/g" workers/wrangler.toml
          sed -i "s/\${CLOUDFLARE_ACCOUNT_ID}/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/g" workers/wrangler.toml
      - name: Deploy Workers
        run: cd workers && npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-frontend:
    name: Deploy Frontend to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: deploy-workers
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Install Wrangler
        run: npm install -g wrangler
      - name: Deploy to Pages
        run: wrangler pages deploy frontend --project-name cyberdudebivash-security-hub --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-workers, deploy-frontend]
    steps:
      - name: Print deployment info
        run: |
          echo "======================================="
          echo "  CYBERDUDEBIVASH AI Security Hub"
          echo "  Deployment Complete ✅"
          echo "======================================="
          echo "  Workers API: https://cyberdudebivash-security-hub.workers.dev"
          echo "  Frontend:    https://cyberdudebivash-security-hub.pages.dev"
          echo "  Website:     https://cyberdudebivash.in"
          echo "======================================="
          echo "  Deployed at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "  Commit:      ${{ github.sha }}"
          echo "======================================="
