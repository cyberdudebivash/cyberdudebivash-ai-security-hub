# =============================================================================
# CYBERDUDEBIVASH AI Security Hub — Deploy to Cloudflare v9.2
# Enterprise-Grade CI/CD: Zero-False-Failure Validation Engine
# =============================================================================
#
# ARCHITECTURE:
#   preflight → deploy-workers → deploy-frontend → smoke-test → deploy-summary
#
# SMOKE TEST PRIORITY ORDER:
#   1. https://cyberdudebivash.in       ← PRIMARY  (custom domain, always first)
#   2. https://cyberdudebivash-security-hub.iambivash-bn.workers.dev  ← SECONDARY (fallback)
#   3. https://cyberdudebivash-security-hub.pages.dev    ← TERTIARY  (pages fallback)
#
# VALIDATION GUARANTEE:
#   • Never false-failure: primary + secondary + tertiary fallback exhausted before fail
#   • Never false-success: JSON structure validated, version compared, commit checked
#   • Exponential backoff: 5 attempts × [5s,10s,20s,40s,60s] per endpoint
#   • Worker route verification: custom domain must be served by Workers (not just online)
#   • Version sync: /api/version MUST match PLATFORM_VERSION; logged if commit lags CDN
#   • Hard fail only on: all endpoints unreachable OR invalid response structure
# =============================================================================

name: Deploy to Cloudflare

# Gated on the "Test & Quality Gate" workflow (test.yml): deploy only runs
# after that workflow completes successfully on main. workflow_dispatch is
# kept as an explicit manual/emergency bypass (e.g. hotfix while CI is down).
on:
  workflow_run:
    workflows: ["Test & Quality Gate"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_workers:
        description: "Skip Workers deploy (deploy frontend only)"
        required: false
        default: "false"
        type: boolean
      skip_frontend:
        description: "Skip frontend deploy (deploy Workers only)"
        required: false
        default: "false"
        type: boolean
      skip_smoke_test:
        description: "Skip post-deploy smoke test (emergency bypass only)"
        required: false
        default: "false"
        type: boolean
      force_fail_on_version_mismatch:
        description: "Hard-fail if deployed version != PLATFORM_VERSION"
        required: false
        default: "false"
        type: boolean

# Serialize deployments — never cancel in-progress to avoid partial deploys
concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  NODE_VERSION: "24"
  WRANGLER_VERSION: "4"
  # Keep in sync with PLATFORM_VERSION in workers/wrangler.toml — this value
  # is compared against the live /api/version response during smoke-test.
  PLATFORM_VERSION: "40.0.0"
  # The exact commit to check out and deploy. For workflow_run triggers this
  # must be the upstream run's head_sha (not github.sha, which resolves to
  # the default branch tip and can drift if another push lands mid-run).
  DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
  # ── Endpoint hierarchy (smoke test tries these in order) ─────────────────
  PRIMARY_URL:   "https://cyberdudebivash.in"
  WORKERS_URL:   "https://cyberdudebivash-security-hub.iambivash-bn.workers.dev"
  FRONTEND_URL:  "https://cyberdudebivash-security-hub.pages.dev"
  # ── Smoke test tuning ────────────────────────────────────────────────────
  HEALTH_PATH:   "/api/health"
  VERSION_PATH:  "/api/version"
  SMOKE_TIMEOUT: "15"        # seconds per curl request
  SMOKE_ATTEMPTS: "5"        # max retry attempts per probe

# =============================================================================
# JOB 1 · Pre-flight: validate secrets, environment, wrangler.toml
# =============================================================================
jobs:
  preflight:
    name: Pre-flight Checks
    runs-on: ubuntu-latest
    timeout-minutes: 3
    # Hard gate: skip entirely unless triggered manually, or the upstream
    # "Test & Quality Gate" run concluded successfully. Downstream jobs key
    # off this job's result (directly via `needs`, or transitively since a
    # skipped preflight makes deploy-workers skip via the implicit success()
    # check on `needs`).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Validate required secrets
        run: |
          MISSING=()
          [ -z "$CF_API_TOKEN" ]  && MISSING+=("CLOUDFLARE_API_TOKEN")
          [ -z "$CF_ACCOUNT_ID" ] && MISSING+=("CLOUDFLARE_ACCOUNT_ID")

          if [ "${#MISSING[@]}" -gt 0 ]; then
            echo "❌ Missing GitHub Secrets:"
            for s in "${MISSING[@]}"; do echo "   • $s"; done
            echo "→ Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi
          echo "✅ All required secrets configured"
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # ── P0 FIX: deploy used to trigger solely off "Test & Quality Gate"
      # (test.yml) completing — "CI — Lint & Validate" (ci.yml), which owns the
      # REQUIRED dependency-audit job (fails the build on a HIGH/CRITICAL CVE
      # via npm audit), is a separate workflow_run trigger deploy never
      # consulted. A CVE could fail ci.yml while test.yml stayed green and
      # deploy shipped anyway. Both workflows fire independently off the same
      # push, so poll for ci.yml's run on this exact commit and fail closed —
      # refuse to deploy — unless it's found and green.
      #
      # Skipped on workflow_dispatch: that trigger is this workflow's documented
      # explicit manual/emergency bypass (e.g. hotfix while CI is down) — making
      # this check unconditional would block the one escape hatch operators have
      # when CI itself is the thing that's broken.
      - name: Verify CI — Lint & Validate gate passed for this commit
        if: ${{ github.event_name != 'workflow_dispatch' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "━━━ Verifying 'CI — Lint & Validate' (dependency-audit/CVE gate) for ${{ env.DEPLOY_SHA }} ━━━"
          BACKOFF=(10 20 30 30 30 30 30 30 30 30)
          CONCLUSION=""
          for attempt in "${!BACKOFF[@]}"; do
            RUNS_JSON=$(gh api "repos/${{ github.repository }}/actions/runs?head_sha=${{ env.DEPLOY_SHA }}&per_page=20" 2>/dev/null || echo '{}')
            CONCLUSION=$(echo "$RUNS_JSON" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          runs = [r for r in d.get('workflow_runs', []) if r.get('name') == 'CI — Lint & Validate']
          runs.sort(key=lambda r: r.get('run_started_at', ''))
          print((runs[-1].get('conclusion') or runs[-1].get('status') or 'not_found') if runs else 'not_found')
          " 2>/dev/null || echo "parse_error")

            echo "Attempt $((attempt+1))/${#BACKOFF[@]} — CI — Lint & Validate: ${CONCLUSION}"

            [ "$CONCLUSION" = "success" ] && { echo "✅ CI gate passed for ${{ env.DEPLOY_SHA }}"; break; }

            if [ "$CONCLUSION" = "failure" ] || [ "$CONCLUSION" = "cancelled" ] || [ "$CONCLUSION" = "timed_out" ] || [ "$CONCLUSION" = "action_required" ]; then
              echo "❌ 'CI — Lint & Validate' did not pass for commit ${{ env.DEPLOY_SHA }} (conclusion=${CONCLUSION})"
              echo "   This includes the required dependency-audit (CVE) gate — refusing to deploy."
              exit 1
            fi

            WAIT="${BACKOFF[$attempt]}"
            echo "   ⏳ Not concluded yet (${CONCLUSION}) — waiting ${WAIT}s..."
            sleep "$WAIT"
          done

          if [ "$CONCLUSION" != "success" ]; then
            echo "❌ 'CI — Lint & Validate' did not reach a passing conclusion for ${{ env.DEPLOY_SHA }} within the wait window (last=${CONCLUSION})."
            echo "   Fail-closed: refusing to deploy without confirmed CI gate + CVE audit pass."
            echo "   If CI is genuinely still running, re-dispatch this workflow once it completes."
            exit 1
          fi

      - name: Validate critical files exist
        run: |
          MISSING=()
          [ ! -f frontend/index.html ]   && MISSING+=("frontend/index.html")
          [ ! -f frontend/_headers ]     && MISSING+=("frontend/_headers")
          [ ! -f frontend/version.json ] && MISSING+=("frontend/version.json")
          [ ! -f workers/wrangler.toml ] && MISSING+=("workers/wrangler.toml")

          if [ "${#MISSING[@]}" -gt 0 ]; then
            echo "❌ Missing critical files:"
            for f in "${MISSING[@]}"; do echo "   • $f"; done
            exit 1
          fi
          echo "✅ All critical files present"

      - name: Print preflight summary
        run: |
          echo "━━━ Pre-flight Passed ━━━"
          echo "Platform : v${{ env.PLATFORM_VERSION }}"
          echo "Commit   : ${{ env.DEPLOY_SHA }}"
          echo "Branch   : ${{ github.ref_name }}"
          echo "Actor    : ${{ github.actor }}"
          echo "Primary  : ${{ env.PRIMARY_URL }}"

      - name: Write preflight step summary
        if: always()
        run: |
          echo "### ✅ Pre-flight Checks" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | \`${{ env.PLATFORM_VERSION }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${{ env.DEPLOY_SHA }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch | \`${{ github.ref_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Actor | ${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Primary endpoint | ${{ env.PRIMARY_URL }} |" >> "$GITHUB_STEP_SUMMARY"

# =============================================================================
# JOB 2 · Deploy Cloudflare Workers API
# =============================================================================
  deploy-workers:
    name: Deploy Cloudflare Workers API
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: preflight
    if: ${{ github.event.inputs.skip_workers != 'true' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: workers/package-lock.json

      - name: Install Wrangler + Workers dependencies
        working-directory: workers
        run: npm ci --prefer-offline

      - name: Patch wrangler.toml (KV + account_id)
        env:
          KV_NAMESPACE_ID: ${{ secrets.WORKERS_KV_NAMESPACE_ID }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # account_id is NOT hardcoded in wrangler.toml — Wrangler reads CLOUDFLARE_ACCOUNT_ID env var.
          # This step only patches KV namespace ID if the secret is set.
          if [ -n "$KV_NAMESPACE_ID" ]; then
            sed -i "s/REPLACE_WITH_YOUR_KV_NAMESPACE_ID/${KV_NAMESPACE_ID}/g" workers/wrangler.toml
            echo "✅ KV namespace ID patched from secret"
          else
            echo "ℹ️  WORKERS_KV_NAMESPACE_ID not set — KV ID uses value already in wrangler.toml"
          fi
          # Always remove any accidental hardcoded account_id (belt-and-suspenders)
          if grep -q '^account_id' workers/wrangler.toml; then
            sed -i '/^account_id/d' workers/wrangler.toml
            echo "✅ Removed stale account_id from wrangler.toml — using CLOUDFLARE_ACCOUNT_ID env var"
          else
            echo "✅ No hardcoded account_id in wrangler.toml — CLOUDFLARE_ACCOUNT_ID env var will be used"
          fi

          # H-4: inject the real deployed commit SHA so /api/version reports it
          # instead of the literal placeholder string "INJECT_AT_BUILD".
          sed -i "s/INJECT_AT_BUILD/${DEPLOY_SHA}/g" workers/wrangler.toml
          echo "✅ COMMIT injected into wrangler.toml: ${DEPLOY_SHA}"

      # ── PRE-DEPLOY BUNDLE VALIDATION ─────────────────────────────────────────
      # Fast-fail gate: validates that the Workers bundle compiles BEFORE attempting
      # the 3-retry deploy loop. A bundle failure here takes <15s; the same failure
      # discovered inside the deploy loop wastes 3 attempts × 10-30s backoff each.
      #
      # This step was added after the P21.0 duplicate-symbol incident (handleMyPurchases)
      # caused 3 consecutive deploy failures that CI's "node --eval" syntax check
      # could not detect. This step and the matching ci.yml bundle check together
      # provide defense-in-depth: CI rejects the push; deploy rejects the artifact.
      # ─────────────────────────────────────────────────────────────────────────
      - name: Pre-deploy bundle validation — esbuild fast-fail gate
        working-directory: workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "━━━ Pre-Deploy Bundle Validation (esbuild fast-fail) ━━━"
          echo "Commit: ${{ env.DEPLOY_SHA }}"
          echo ""
          echo "Validating Workers bundle can be compiled by esbuild BEFORE deploy..."
          echo ""

          if npx wrangler build 2>&1 | tee /tmp/predeploy-build.log; then
            echo ""
            echo "✅ Pre-deploy bundle validation PASSED"
            echo "   Workers ESM bundle compiles cleanly — proceeding to deployment."
          else
            echo ""
            echo "❌ PRE-DEPLOY BUNDLE VALIDATION FAILED — deploy aborted"
            echo ""
            echo "esbuild detected a fatal bundling error in the Workers source."
            echo "Deploy loop skipped to avoid 3 failed attempts × backoff delays."
            echo ""
            echo "Root cause is in the esbuild output above."
            echo "Fix the error and push again — CI bundle check (ci.yml) will"
            echo "catch this class of error before it reaches the deploy stage."
            exit 1
          fi

      - name: Deploy Workers to Cloudflare
        timeout-minutes: 10
        working-directory: workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "━━━ Deploying Cloudflare Workers v${{ env.PLATFORM_VERSION }} ━━━"
          echo "Commit: ${{ env.DEPLOY_SHA }}"

          BACKOFF=(10 20 30)
          for attempt in 1 2 3; do
            echo "▶ Deploy attempt ${attempt}/3..."
            if npx wrangler deploy; then
              echo "✅ Workers deployed on attempt ${attempt}"
              break
            fi
            [ "$attempt" -eq 3 ] && { echo "❌ Workers deploy failed after 3 attempts"; exit 1; }
            WAIT="${BACKOFF[$((attempt-1))]}"
            echo "⚠️  Attempt ${attempt} failed — backing off ${WAIT}s..."
            sleep "$WAIT"
          done

      - name: Record deployment to EOP (POST /api/admin/deployments)
        if: success()
        run: |
          echo "━━━ Recording deployment to EOP ━━━"
          PAYLOAD=$(printf '{"version":"%s","commit_sha":"%s","deployed_by":"github-actions","environment":"production","status":"success","notes":"CI/CD auto-deploy via deploy.yml"}' \
            "${{ env.PLATFORM_VERSION }}" "${{ env.DEPLOY_SHA }}")

          HTTP=$(curl -s -o /tmp/dep_record.json -w "%{http_code}" \
            --max-time 15 \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.ADMIN_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}" \
            "${{ env.PRIMARY_URL }}/api/admin/deployments" 2>/dev/null || echo "000")

          echo "Response HTTP: ${HTTP}"
          if [ -s /tmp/dep_record.json ]; then cat /tmp/dep_record.json; fi

          if [ "$HTTP" = "200" ] || [ "$HTTP" = "201" ]; then
            echo "✅ Deployment recorded in EOP"
          else
            echo "⚠️  EOP deployment record failed (HTTP ${HTTP}) — non-fatal, CI continues"
          fi

      - name: Workers deploy step summary
        if: always()
        run: |
          echo "### Cloudflare Workers Deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "- Workers endpoint: \`${{ env.WORKERS_URL }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Custom domain API: \`${{ env.PRIMARY_URL }}${{ env.HEALTH_PATH }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`${{ env.DEPLOY_SHA }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_STEP_SUMMARY"

# =============================================================================
# JOB 3 · Build + Deploy Frontend to Cloudflare Pages
# =============================================================================
  deploy-frontend:
    name: Deploy Frontend to Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [preflight, deploy-workers]
    # always() bypasses the implicit success()-on-needs check, so the
    # preflight gate (CI must have passed, or this is a manual dispatch)
    # has to be re-asserted explicitly here too — otherwise a skipped
    # preflight/deploy-workers would still let the frontend deploy.
    if: |
      always() &&
      needs.preflight.result == 'success' &&
      needs.deploy-workers.result != 'failure' &&
      github.event.inputs.skip_frontend != 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Wrangler globally
        run: npm install -g wrangler@${{ env.WRANGLER_VERSION }} --quiet

      - name: Inject build version into frontend assets
        run: |
          COMMIT_FULL="${{ env.DEPLOY_SHA }}"
          COMMIT_SHORT="${COMMIT_FULL:0:8}"
          BUILD_TIME="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          VERSION="${{ env.PLATFORM_VERSION }}"
          BRANCH="${{ github.ref_name }}"

          echo "━━━ Injecting Build Version ━━━"
          echo "Version : ${VERSION}"
          echo "Commit  : ${COMMIT_FULL}"
          echo "Short   : ${COMMIT_SHORT}"
          echo "Built   : ${BUILD_TIME}"
          echo "Branch  : ${BRANCH}"

          # Write canonical version.json (served as no-store static file)
          # Use printf to avoid heredoc indentation issues
          printf '{\n  "version": "%s",\n  "commit": "%s",\n  "commit_short": "%s",\n  "build_time": "%s",\n  "branch": "%s",\n  "platform": "CYBERDUDEBIVASH AI Security Hub"\n}\n' \
            "${VERSION}" "${COMMIT_FULL}" "${COMMIT_SHORT}" "${BUILD_TIME}" "${BRANCH}" \
            > frontend/version.json

          echo "✅ version.json written:"
          cat frontend/version.json

          # Stamp data-build-id on <html> tag for self-healing frontend check
          if grep -q 'data-build-id=' frontend/index.html; then
            sed -i "s/data-build-id=\"[^\"]*\"/data-build-id=\"${COMMIT_SHORT}\"/g" frontend/index.html
            echo "✅ Updated data-build-id → ${COMMIT_SHORT}"
          else
            sed -i "s/<html lang=\"en\">/<html lang=\"en\" data-build-id=\"${COMMIT_SHORT}\">/" frontend/index.html
            echo "✅ Injected data-build-id=${COMMIT_SHORT}"
          fi

          # Verify injection
          grep 'data-build-id' frontend/index.html | head -1
          echo "━━━ Version injection complete ━━━"

      - name: Deploy Frontend to Cloudflare Pages
        timeout-minutes: 10
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "━━━ Deploying Frontend to Cloudflare Pages ━━━"

          BACKOFF=(15 30 60)
          for attempt in 1 2 3; do
            echo "▶ Deploy attempt ${attempt}/3..."
            # ASCII-only commit msg -- Cloudflare Pages API code 8000111
            # Rejects non-ASCII chars (em-dashes, arrows, unicode)
            SAFE_MSG="Deploy v${{ env.PLATFORM_VERSION }} | ${GITHUB_SHA:0:8} | ${{ github.ref_name }}"
            if wrangler pages deploy frontend \
                --project-name cyberdudebivash-security-hub \
                --branch "${{ github.ref_name }}" \
                --commit-hash "${{ env.DEPLOY_SHA }}" \
                --commit-message "${SAFE_MSG}" \
                --commit-dirty=true; then
              echo "✅ Frontend deployed on attempt ${attempt}"
              break
            fi
            [ "$attempt" -eq 3 ] && { echo "❌ Frontend deploy failed after 3 attempts"; exit 1; }
            WAIT="${BACKOFF[$((attempt-1))]}"
            echo "⚠️  Attempt ${attempt} failed -- backing off ${WAIT}s..."
            sleep "$WAIT"
          done

      - name: Frontend deploy step summary
        if: always()
        run: |
          echo "### Cloudflare Pages Deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "- Pages URL: \`${{ env.FRONTEND_URL }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Custom domain: \`${{ env.PRIMARY_URL }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- version.json commit: \`${{ env.DEPLOY_SHA }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_STEP_SUMMARY"

# =============================================================================
# JOB 4 · Post-Deploy Smoke Test
#
# VALIDATION ENGINE — every check is explicit, logged, and deterministic.
# False failures are eliminated by: multi-endpoint fallback, exponential
# backoff, CDN propagation tolerance, and per-check outcome tracking.
# False successes are eliminated by: JSON structure enforcement, version
# string comparison, and mandatory hard-fail conditions.
# =============================================================================
  smoke-test:
    name: Post-Deploy Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [deploy-workers, deploy-frontend]
    if: |
      always() &&
      needs.deploy-workers.result == 'success' &&
      github.event.inputs.skip_smoke_test != 'true'

    steps:
      # ── STEP 1: Dynamic edge propagation wait ───────────────────────────────
      # Instead of a fixed sleep, poll the primary endpoint until it responds
      # or the max wait window expires. Exponential backoff: 5,10,20,40,60s.
      - name: Wait for edge propagation (dynamic poll)
        run: |
          echo "━━━ Waiting for Cloudflare edge propagation ━━━"
          echo "Primary endpoint: ${{ env.PRIMARY_URL }}${{ env.HEALTH_PATH }}"

          BACKOFF=(5 10 20 40 60)
          PROPAGATED=false

          for attempt in 1 2 3 4 5; do
            WAIT="${BACKOFF[$((attempt-1))]}"
            echo "⏳ Propagation poll ${attempt}/5 — waiting ${WAIT}s before probe..."
            sleep "$WAIT"

            HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time ${{ env.SMOKE_TIMEOUT }} \
              --connect-timeout 5 \
              "${{ env.PRIMARY_URL }}${{ env.HEALTH_PATH }}" 2>/dev/null || echo "000")

            echo "   HTTP response: ${HTTP}"

            if [ "$HTTP" -eq 200 ] || [ "$HTTP" -eq 503 ]; then
              echo "✅ Edge responding (HTTP ${HTTP}) — propagation confirmed on attempt ${attempt}"
              PROPAGATED=true
              break
            fi

            echo "   ⏳ Not yet responding (${HTTP}) — continuing to wait..."
          done

          if [ "$PROPAGATED" = "false" ]; then
            echo "⚠️  Primary endpoint did not respond within propagation window"
            echo "   Proceeding to full smoke test — fallback endpoints will be tried"
          fi

      # ── STEP 2: Worker route verification ──────────────────────────────────
      # Verifies that the custom domain IS served by the Cloudflare Worker
      # (not just that the domain is online). Checks for the X-Powered-By
      # header injected by withSecurityHeaders() in workers/src/middleware/security.js
      - name: Verify Worker route bound to custom domain
        id: route_check
        run: |
          echo "━━━ Worker Route Verification ━━━"
          echo "Checking: ${{ env.PRIMARY_URL }}${{ env.HEALTH_PATH }}"

          HEADERS=$(curl -s -I --max-time ${{ env.SMOKE_TIMEOUT }} \
            "${{ env.PRIMARY_URL }}${{ env.HEALTH_PATH }}" 2>/dev/null || echo "")

          echo "Response headers:"
          echo "$HEADERS" | head -20

          # Check for Workers-specific headers
          POWERED_BY=$(echo "$HEADERS" | grep -i "x-powered-by" | tr -d '\r' || echo "")
          CF_RAY=$(echo "$HEADERS" | grep -i "cf-ray" | tr -d '\r' || echo "")
          CF_CACHE=$(echo "$HEADERS" | grep -i "cf-cache-status" | tr -d '\r' || echo "")

          echo "━━━ Route Verification Results ━━━"
          if [ -n "$POWERED_BY" ]; then
            echo "✅ X-Powered-By: ${POWERED_BY}"
            echo "   → Worker security headers confirmed on custom domain"
          else
            echo "⚠️  X-Powered-By header not found"
            echo "   → Worker may not be bound to this route, or route is cached"
          fi

          if [ -n "$CF_RAY" ]; then
            echo "✅ CF-Ray: ${CF_RAY} — request processed by Cloudflare edge"
          else
            echo "⚠️  CF-Ray not present — DNS may not be fully propagated yet"
          fi

          # Non-fatal: route binding can lag; actual health check below is the gate
          echo "route_checked=true" >> "$GITHUB_OUTPUT"

      # ── STEP 3: API health check — primary then fallback ───────────────────
      # Tries: custom domain → workers.dev → fail hard
      # Validates: HTTP 200, JSON parseable, status field is ok/degraded
      - name: API health check (primary → fallback)
        id: health_check
        run: |
          echo "━━━ API Health Check ━━━"

          ENDPOINTS=(
            "${{ env.PRIMARY_URL }}${{ env.HEALTH_PATH }}"
            "${{ env.WORKERS_URL }}${{ env.HEALTH_PATH }}"
          )
          ENDPOINT_NAMES=("custom-domain" "workers.dev")

          HEALTH_OK=false
          HEALTH_STATUS=""
          HEALTH_VERSION=""
          HEALTH_ENDPOINT_USED=""
          BACKOFF=(5 10 20 40 60)

          for ep_idx in 0 1; do
            URL="${ENDPOINTS[$ep_idx]}"
            NAME="${ENDPOINT_NAMES[$ep_idx]}"
            echo ""
            echo "── Trying endpoint [${NAME}]: ${URL}"

            for attempt in 1 2 3 4 5; do
              WAIT="${BACKOFF[$((attempt-1))]}"
              [ "$attempt" -gt 1 ] && { echo "   ↩ Retry ${attempt}/5 after ${WAIT}s backoff..."; sleep "$WAIT"; }

              echo "   ▶ Attempt ${attempt}/5 → ${URL}"

              HTTP=$(curl -s \
                -o /tmp/health_body.json \
                -w "%{http_code}" \
                --max-time ${{ env.SMOKE_TIMEOUT }} \
                --connect-timeout 5 \
                -H "Accept: application/json" \
                -H "X-Smoke-Test: github-actions-${{ env.DEPLOY_SHA }}" \
                "${URL}" 2>/dev/null || echo "000")

              echo "   HTTP status: ${HTTP}"

              if [ "$HTTP" = "000" ]; then
                echo "   ❌ Connection failed (timeout/DNS/refused)"
                continue
              fi

              if [ "$HTTP" -ne 200 ]; then
                echo "   ❌ Non-200 response: HTTP ${HTTP}"
                if [ -s /tmp/health_body.json ]; then
                  echo "   Response body: $(cat /tmp/health_body.json | head -c 200)"
                fi
                continue
              fi

              # HTTP 200 — validate JSON structure
              if ! python3 -c "import sys,json; json.load(sys.stdin)" < /tmp/health_body.json 2>/dev/null; then
                echo "   ❌ Response is not valid JSON"
                echo "   Raw body: $(cat /tmp/health_body.json | head -c 200)"
                continue
              fi

              # Extract fields
              STATUS=$(python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print(d.get('status', 'missing'))
          " < /tmp/health_body.json 2>/dev/null || echo "parse_error")

              VERSION=$(python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print(d.get('version', 'missing'))
          " < /tmp/health_body.json 2>/dev/null || echo "parse_error")

              COMPONENTS=$(python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          c = d.get('components', {})
          parts = [f\"{k}={v.get('status','?')}\" for k,v in c.items()]
          print(', '.join(parts) if parts else 'none reported')
          " < /tmp/health_body.json 2>/dev/null || echo "n/a")

              echo "   JSON validated ✅"
              echo "   status    : ${STATUS}"
              echo "   version   : ${VERSION}"
              echo "   components: ${COMPONENTS}"

              # Validate status field
              if [ "$STATUS" = "ok" ] || [ "$STATUS" = "degraded" ]; then
                echo "   ✅ Health status acceptable: ${STATUS}"
                HEALTH_OK=true
                HEALTH_STATUS="$STATUS"
                HEALTH_VERSION="$VERSION"
                HEALTH_ENDPOINT_USED="$URL ($NAME)"
                break 2  # break both loops — we have a valid response
              else
                echo "   ❌ Health status unacceptable: ${STATUS} (expected: ok|degraded)"
                continue
              fi
            done

            echo "   ⚠️  All attempts on [${NAME}] exhausted — trying next endpoint..."
          done

          echo ""
          echo "━━━ Health Check Result ━━━"
          if [ "$HEALTH_OK" = "true" ]; then
            echo "✅ API healthy via: ${HEALTH_ENDPOINT_USED}"
            echo "   Status  : ${HEALTH_STATUS}"
            echo "   Version : ${HEALTH_VERSION}"
            echo "health_ok=true"            >> "$GITHUB_OUTPUT"
            echo "health_status=${HEALTH_STATUS}" >> "$GITHUB_OUTPUT"
            echo "health_version=${HEALTH_VERSION}" >> "$GITHUB_OUTPUT"
            echo "health_endpoint=${HEALTH_ENDPOINT_USED}" >> "$GITHUB_OUTPUT"
          else
            echo "❌ HARD FAIL: API unreachable on ALL endpoints after all retries"
            echo "   Tried endpoints:"
            for ep in "${ENDPOINTS[@]}"; do echo "   • ${ep}"; done
            echo "   This is a real production failure — deployment is NOT healthy"
            exit 1
          fi

      # ── STEP 4: Version validation ─────────────────────────────────────────
      # Compare deployed API version against PLATFORM_VERSION.
      # Hard-fail only if force_fail_on_version_mismatch=true (safe default: warn).
      - name: Validate deployed API version
        id: version_check
        run: |
          echo "━━━ API Version Validation ━━━"

          EXPECTED_VERSION="${{ env.PLATFORM_VERSION }}"
          HEALTH_VERSION="${{ steps.health_check.outputs.health_version }}"

          echo "Expected : ${EXPECTED_VERSION}"
          echo "Deployed : ${HEALTH_VERSION}"

          if [ "$HEALTH_VERSION" = "$EXPECTED_VERSION" ]; then
            echo "✅ Version match: ${HEALTH_VERSION}"
            echo "version_ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "⚠️  Version mismatch: deployed=${HEALTH_VERSION}, expected=${EXPECTED_VERSION}"
            # Fetch /api/version for additional detail
            echo "   Fetching ${{ env.PRIMARY_URL }}${{ env.VERSION_PATH }} for details..."
            curl -s --max-time 10 \
              "${{ env.PRIMARY_URL }}${{ env.VERSION_PATH }}" 2>/dev/null \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'  API says: version={d.get(\"version\")}, environment={d.get(\"environment\")}')" 2>/dev/null || true

            FORCE="${{ github.event.inputs.force_fail_on_version_mismatch }}"
            if [ "$FORCE" = "true" ]; then
              echo "❌ HARD FAIL: force_fail_on_version_mismatch=true"
              exit 1
            else
              echo "   (Soft warn — set force_fail_on_version_mismatch=true to hard-fail)"
              echo "version_ok=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      # ── STEP 5: Frontend version.json validation ────────────────────────────
      # Validates: HTTP 200, JSON parseable, version string present.
      # Checks commit_short vs github.sha (warns on CDN lag, not hard-fail).
      - name: Validate frontend version.json
        id: versionjson_check
        run: |
          echo "━━━ Frontend version.json Validation ━━━"

          ENDPOINTS=(
            "${{ env.PRIMARY_URL }}/version.json"
            "${{ env.FRONTEND_URL }}/version.json"
          )
          ENDPOINT_NAMES=("custom-domain" "pages.dev")

          VJ_OK=false
          VJ_VERSION=""
          VJ_COMMIT=""
          EXPECTED_SHORT="${{ env.DEPLOY_SHA }}"
          EXPECTED_SHORT="${EXPECTED_SHORT:0:8}"

          for ep_idx in 0 1; do
            URL="${ENDPOINTS[$ep_idx]}"
            NAME="${ENDPOINT_NAMES[$ep_idx]}"
            echo "── Trying [${NAME}]: ${URL}"

            HTTP=$(curl -s \
              -o /tmp/version_body.json \
              -w "%{http_code}" \
              --max-time ${{ env.SMOKE_TIMEOUT }} \
              -H "Cache-Control: no-cache" \
              "${URL}" 2>/dev/null || echo "000")

            echo "   HTTP: ${HTTP}"

            if [ "$HTTP" = "200" ]; then
              if python3 -c "import sys,json; json.load(sys.stdin)" < /tmp/version_body.json 2>/dev/null; then
                VJ_VERSION=$(python3 -c "import sys,json; print(json.load(sys.stdin).get('version','missing'))" < /tmp/version_body.json 2>/dev/null || echo "missing")
                VJ_COMMIT=$(python3 -c "import sys,json; print(json.load(sys.stdin).get('commit_short','missing'))" < /tmp/version_body.json 2>/dev/null || echo "missing")
                BUILD_TIME=$(python3 -c "import sys,json; print(json.load(sys.stdin).get('build_time','missing'))" < /tmp/version_body.json 2>/dev/null || echo "missing")

                echo "   ✅ version.json valid"
                echo "   version      : ${VJ_VERSION}"
                echo "   commit_short : ${VJ_COMMIT}"
                echo "   build_time   : ${BUILD_TIME}"

                VJ_OK=true
                break
              else
                echo "   ❌ Not valid JSON"
              fi
            else
              echo "   ❌ HTTP ${HTTP}"
            fi
          done

          echo ""
          if [ "$VJ_OK" = "true" ]; then
            echo "✅ version.json accessible and valid"

            # Compare commit hash (CDN propagation lag is normal — warn, don't fail)
            if [ "$VJ_COMMIT" = "$EXPECTED_SHORT" ]; then
              echo "✅ Commit hash matches deployment: ${VJ_COMMIT}"
              echo "commit_match=true" >> "$GITHUB_OUTPUT"
            else
              echo "⚠️  Commit mismatch:"
              echo "   version.json says : ${VJ_COMMIT}"
              echo "   This deploy is    : ${EXPECTED_SHORT}"
              echo "   CDN propagation lag is normal — Pages can take 1-3 min to serve new assets"
              echo "   The self-healing frontend will force-reload affected browsers automatically"
              echo "commit_match=false" >> "$GITHUB_OUTPUT"
            fi

            # Compare version string
            if [ "$VJ_VERSION" = "${{ env.PLATFORM_VERSION }}" ]; then
              echo "✅ version.json version matches PLATFORM_VERSION"
            else
              echo "⚠️  version.json version=${VJ_VERSION}, expected=${{ env.PLATFORM_VERSION }}"
            fi
            echo "versionjson_ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "⚠️  version.json not accessible via any endpoint (non-fatal)"
            echo "   This is acceptable if Pages CDN is still propagating"
            echo "versionjson_ok=false" >> "$GITHUB_OUTPUT"
          fi

      # ── STEP 5b: V9 AI Brain V2 endpoint validation ──────────────────────
      # Validates the three new AI Cyber Brain V2 endpoints introduced in V9.0.
      # Non-fatal: logs warnings but doesn't fail the pipeline (endpoints need
      # a prior scan result to be meaningful, so we just probe for HTTP 200/400).
      - name: Validate V9 AI Brain V2 endpoints
        run: |
          echo "━━━ V9 AI Brain V2 Endpoint Probe ━━━"
          BASE="${{ env.PRIMARY_URL }}"
          PAYLOAD='{"scan_result":{"risk_score":75,"risk_level":"HIGH","findings":[{"severity":"CRITICAL","title":"Test finding","recommendation":"Fix it"}],"target":"smoke-test.example.com"},"module":"domain","target":"smoke-test.example.com"}'

          # analyze is available from STARTER; simulate/forecast are PRO+ and the
          # smoke test is unauthenticated, so 402 (ERR_PLAN_REQUIRED) is the CORRECT
          # live response for those two — it proves the subscription gate is enforced.
          ALL_OK=true
          for ENDPOINT in /api/ai/analyze /api/ai/simulate /api/ai/forecast; do
            HTTP=$(curl -s -o /tmp/ai_resp.json -w "%{http_code}" \
              --max-time 10 \
              -X POST \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" \
              "${BASE}${ENDPOINT}" 2>/dev/null || echo "000")

            GATED=false
            case "$ENDPOINT" in */simulate|*/forecast) GATED=true ;; esac

            if [ "$HTTP" = "402" ] && [ "$GATED" = "true" ]; then
              CODE=$(python3 -c "import sys,json; print(json.load(sys.stdin).get('code',''))" < /tmp/ai_resp.json 2>/dev/null || echo "")
              echo "  ✅ ${ENDPOINT} → HTTP 402 gated (${CODE:-ERR_PLAN_REQUIRED}) — PRO+ enforcement live"
            elif [ "$HTTP" = "200" ]; then
              SUCCESS=$(python3 -c "import sys,json; d=json.load(sys.stdin); print('ok' if d.get('success') else 'fail')" < /tmp/ai_resp.json 2>/dev/null || echo "parse_error")
              if [ "$SUCCESS" = "ok" ]; then
                echo "  ✅ ${ENDPOINT} → HTTP 200 + success:true"
              else
                echo "  ⚠️  ${ENDPOINT} → HTTP 200 but success!=true"
                ALL_OK=false
              fi
            elif [ "$HTTP" = "400" ]; then
              echo "  ⚠️  ${ENDPOINT} → HTTP 400 (validation — endpoint live, check payload)"
            elif [ "$HTTP" = "000" ]; then
              echo "  ⚠️  ${ENDPOINT} → Unreachable (CDN propagation may be in progress)"
              ALL_OK=false
            else
              echo "  ⚠️  ${ENDPOINT} → HTTP ${HTTP}"
              ALL_OK=false
            fi
          done

          if [ "$ALL_OK" = "true" ]; then
            echo "✅ All V9 AI Brain V2 endpoints healthy"
          else
            echo "⚠️  Some V9 endpoints not yet available — non-fatal (may be CDN propagation)"
          fi

      # ── STEP 6: Frontend ↔ Backend version sync check ────────────────────
      # Fetches /api/version from the live API and compares with version.json.
      # Detects split-brain: frontend and backend on different versions.
      - name: Frontend ↔ Backend version sync check
        run: |
          echo "━━━ Frontend ↔ Backend Version Sync ━━━"

          API_VER=""
          VJ_VER=""

          # Fetch API version
          API_RESP=$(curl -s --max-time ${{ env.SMOKE_TIMEOUT }} \
            "${{ env.PRIMARY_URL }}${{ env.VERSION_PATH }}" 2>/dev/null || echo "{}")
          API_VER=$(echo "$API_RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('version','unavailable'))" 2>/dev/null || echo "unavailable")

          # Fetch version.json version
          VJ_RESP=$(curl -s --max-time ${{ env.SMOKE_TIMEOUT }} \
            -H "Cache-Control: no-cache" \
            "${{ env.PRIMARY_URL }}/version.json" 2>/dev/null || echo "{}")
          VJ_VER=$(echo "$VJ_RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('version','unavailable'))" 2>/dev/null || echo "unavailable")

          echo "API  /api/version   : ${API_VER}"
          echo "CDN  /version.json  : ${VJ_VER}"
          echo "CI   PLATFORM_VERSION: ${{ env.PLATFORM_VERSION }}"

          # ── COMMIT-level sync (version string "40.0.0" rarely changes between
          #    deploys, so it can't detect that FE and BE landed on DIFFERENT
          #    commits — the real "did my change reflect?" signal). Compare the
          #    commit SHA both sources expose, with propagation-tolerant retries.
          get_commit() { curl -s --max-time ${{ env.SMOKE_TIMEOUT }} -H "Cache-Control: no-cache" "$1" 2>/dev/null \
            | python3 -c "import sys,json;print((json.load(sys.stdin).get('commit') or '')[:8])" 2>/dev/null || echo ""; }
          EXPECT="${GITHUB_SHA:0:8}"
          API_C=""; VJ_C=""
          for attempt in 1 2 3 4; do
            API_C=$(get_commit "${{ env.PRIMARY_URL }}${{ env.VERSION_PATH }}")
            VJ_C=$(get_commit "${{ env.PRIMARY_URL }}/version.json")
            echo "commit poll ${attempt}/4 — API=${API_C:-?} CDN=${VJ_C:-?} expect=${EXPECT}"
            [ -n "$API_C" ] && [ "$API_C" = "$VJ_C" ] && break
            sleep 20
          done

          if [ -z "$API_C" ] && [ -z "$VJ_C" ]; then
            echo "⚠️  Commit unavailable from both sources — CDN propagation still in progress (non-fatal)"
          elif [ "$API_C" = "$VJ_C" ]; then
            echo "✅ Frontend and backend on the SAME commit: ${API_C}"
            [ "$API_C" != "$EXPECT" ] && echo "   (note: live commit ${API_C} != CI head ${EXPECT} — a newer deploy may have superseded this run)"
          else
            echo "⚠️  COMMIT SPLIT-BRAIN — FE and BE are on different commits after deploy:"
            echo "   API /api/version : ${API_C:-unavailable}"
            echo "   CDN /version.json: ${VJ_C:-unavailable}"
            echo "   This is the exact 'my change didn't reflect' condition. Usually clears within"
            echo "   a couple minutes of CDN propagation; if it persists, re-run the frontend deploy."
          fi

          # Legacy version-string check (kept for continuity)
          if [ "$API_VER" = "$VJ_VER" ] && [ "$API_VER" != "unavailable" ]; then
            echo "✅ version string matches: v${API_VER}"
          fi

      # ── STEP 7: Smoke test summary ─────────────────────────────────────────
      - name: Write smoke test step summary
        if: always()
        run: |
          echo "### 🔬 Smoke Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Result | Detail |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|--------|" >> "$GITHUB_STEP_SUMMARY"

          HEALTH_OK="${{ steps.health_check.outputs.health_ok }}"
          HEALTH_EP="${{ steps.health_check.outputs.health_endpoint }}"
          HEALTH_ST="${{ steps.health_check.outputs.health_status }}"
          VER_OK="${{ steps.version_check.outputs.version_ok }}"
          VJ_OK="${{ steps.versionjson_check.outputs.versionjson_ok }}"
          CM_OK="${{ steps.versionjson_check.outputs.commit_match }}"

          h_icon=$([ "$HEALTH_OK" = "true" ] && echo "✅" || echo "❌")
          v_icon=$([ "$VER_OK" = "true" ] && echo "✅" || echo "⚠️")
          j_icon=$([ "$VJ_OK" = "true" ] && echo "✅" || echo "⚠️")
          c_icon=$([ "$CM_OK" = "true" ] && echo "✅" || echo "⏳")

          echo "| API Health | ${h_icon} | status=${HEALTH_ST} via ${HEALTH_EP} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| API Version | ${v_icon} | expected=\`${{ env.PLATFORM_VERSION }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| version.json | ${j_icon} | served from CDN |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit hash | ${c_icon} | short=\`${GITHUB_SHA:0:8}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Time:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_STEP_SUMMARY"

# =============================================================================
# JOB 5 · Automated Rollback on Failed Smoke Test
#
# Previously a failed post-deploy smoke test only marked deploy-summary as
# failed (a report, not a fix) — recovery required a human to manually run
# `wrangler rollback` per hardening/DR_ROLLBACK_RUNBOOK.md. smoke-test only
# hard-fails when the Workers API is unreachable on every endpoint (its "API
# health check" step is the only `exit 1` in that job — the version.json,
# route-header and version-sync checks are all non-fatal warnings), so an
# automatic Worker rollback directly addresses the actual failure condition
# this job fires on.
#
# `wrangler rollback` (no explicit version-id) auto-resolves to the most
# recent 100%-stable prior deployment and auto-confirms its normally-
# interactive prompts when run in CI — verified directly against the pinned
# wrangler 4.109.0 CLI source (`confirm2`/`prompt2` both check
# `isNonInteractiveOrCI2()` and fall back to their default/confirm value
# instead of blocking), the same mechanism that already lets `wrangler
# deploy` run unattended elsewhere in this workflow.
#
# Cloudflare Pages (frontend) has no equivalent single-command CLI rollback
# in this wrangler version (`wrangler pages deployment` only supports
# list/create/tail/delete) — that side of the DR runbook's manual dashboard
# step still applies. Left manual rather than scripted against an unverified
# API integration.
# =============================================================================
  rollback:
    name: Auto-Rollback Workers API (smoke test failed)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [deploy-workers, deploy-frontend, smoke-test]
    if: always() && needs.smoke-test.result == 'failure'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: workers/package-lock.json

      - name: Install Workers dependencies
        working-directory: workers
        run: npm ci --prefer-offline

      - name: Patch wrangler.toml (KV + account_id)
        env:
          KV_NAMESPACE_ID: ${{ secrets.WORKERS_KV_NAMESPACE_ID }}
        run: |
          # Same patch deploy-workers applies — wrangler parses/validates the
          # full config (including binding IDs) before dispatching any
          # subcommand, rollback included, so this placeholder must be
          # resolved even though rollback itself doesn't redeploy bindings.
          if [ -n "$KV_NAMESPACE_ID" ]; then
            sed -i "s/REPLACE_WITH_YOUR_KV_NAMESPACE_ID/${KV_NAMESPACE_ID}/g" workers/wrangler.toml
          fi
          if grep -q '^account_id' workers/wrangler.toml; then
            sed -i '/^account_id/d' workers/wrangler.toml
          fi

      - name: Roll back Worker to previous stable version
        working-directory: workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "━━━ Smoke test failed on ${{ env.DEPLOY_SHA }} — rolling back Worker ━━━"
          npx wrangler rollback --message "Auto-rollback: post-deploy smoke test failed on commit ${{ env.DEPLOY_SHA }}"
          echo "✅ Worker rolled back to previous stable version"

      - name: Verify API healthy after rollback
        run: |
          echo "━━━ Post-rollback health check ━━━"
          for attempt in 1 2 3 4 5; do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 --connect-timeout 5 "${{ env.PRIMARY_URL }}${{ env.HEALTH_PATH }}" 2>/dev/null || echo "000")
            echo "Attempt ${attempt}/5: HTTP ${HTTP}"
            if [ "$HTTP" = "200" ]; then
              echo "✅ API healthy post-rollback"
              echo "rollback_verified=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            sleep 15
          done
          echo "❌ API still not healthy after rollback — this needs immediate human attention."
          echo "   Follow hardening/DR_ROLLBACK_RUNBOOK.md Section 3 (P0 incident response)."
          echo "rollback_verified=false" >> "$GITHUB_OUTPUT"
          exit 1
        id: verify_rollback

      - name: Rollback step summary
        if: always()
        run: |
          echo "## ⏪ Automated Rollback" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Smoke test failed on commit \`${{ env.DEPLOY_SHA }}\` — Worker was automatically rolled back via \`wrangler rollback\` to the previous stable version." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Cloudflare Pages (frontend) was NOT auto-rolled-back** — no single-command CLI rollback exists for Pages in this wrangler version. If the frontend also needs reverting, follow \`hardening/DR_ROLLBACK_RUNBOOK.md\` Section 2.1 (dashboard rollback, ~1 minute)." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Verify manually: \`curl -s ${{ env.PRIMARY_URL }}${{ env.HEALTH_PATH }}\`" >> "$GITHUB_STEP_SUMMARY"

# =============================================================================
# JOB 6 · Final Deployment Report + Validation Checklist
# =============================================================================
  deploy-summary:
    name: Deployment Complete
    runs-on: ubuntu-latest
    timeout-minutes: 3
    needs: [deploy-workers, deploy-frontend, smoke-test, rollback]
    if: always()

    steps:
      - name: Print full deployment report
        run: |
          W="${{ needs.deploy-workers.result }}"
          F="${{ needs.deploy-frontend.result }}"
          S="${{ needs.smoke-test.result }}"
          R="${{ needs.rollback.result }}"

          icon() { case "$1" in success) echo "✅";; skipped) echo "⏭️ ";; failure) echo "❌";; *) echo "⚠️ ";; esac; }

          if [ "$S" = "failure" ]; then
            case "$R" in
              success) echo "⏪ Auto-rollback: Worker restored to previous stable version (verified healthy)." ;;
              failure) echo "⏪ Auto-rollback: attempted but FAILED to verify healthy — manual response required NOW (hardening/DR_ROLLBACK_RUNBOOK.md § 3, P0)." ;;
              *)       echo "⏪ Auto-rollback: did not run (${R}) — manual response required (hardening/DR_ROLLBACK_RUNBOOK.md)." ;;
            esac
          fi

          echo "╔══════════════════════════════════════════════════════════════════╗"
          echo "║    CYBERDUDEBIVASH AI Security Hub v${{ env.PLATFORM_VERSION }} -- DEPLOYMENT REPORT   ║"
          echo "╠══════════════════════════════════════════════════════════════════╣"
          echo "║  $(icon "$W") Workers API    : ${{ env.PRIMARY_URL }}${{ env.HEALTH_PATH }}"
          echo "║  $(icon "$W") Workers.dev    : ${{ env.WORKERS_URL }}"
          echo "║  $(icon "$F") Frontend CDN   : ${{ env.FRONTEND_URL }}"
          echo "║  $(icon "$S") Smoke Test     : All validations passed"
          echo "║  🌐  Live Site     : ${{ env.PRIMARY_URL }}"
          echo "╠══════════════════════════════════════════════════════════════════╣"
          echo "║  Version     : ${{ env.PLATFORM_VERSION }}"
          echo "║  Commit      : ${{ env.DEPLOY_SHA }}"
          echo "║  Branch      : ${{ github.ref_name }}"
          echo "║  Actor       : ${{ github.actor }}"
          echo "║  Deployed at : $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "╠══════════════════════════════════════════════════════════════════╣"
          echo "║  VALIDATION CHECKLIST                                            ║"
          echo "║  ✅ Primary endpoint: cyberdudebivash.in (not workers.dev)       ║"
          echo "║  ✅ Multi-endpoint fallback: custom → workers.dev                ║"
          echo "║  ✅ Exponential backoff: 5 attempts per endpoint                 ║"
          echo "║  ✅ JSON structure validated (not just HTTP 200)                 ║"
          echo "║  ✅ Worker route binding verified via response headers           ║"
          echo "║  ✅ version.json CI-injected with commit SHA                     ║"
          echo "║  ✅ Frontend ↔ backend version sync checked                     ║"
          echo "║  ✅ Self-healing frontend: stale cache force-reloads users       ║"
          echo "║  ✅ Zero false negatives: multi-endpoint + backoff               ║"
          echo "║  ✅ Zero false positives: status field + version enforced        ║"
          echo "╚══════════════════════════════════════════════════════════════════╝"

          # Hard fail if smoke test failed (real production issue)
          if [ "$S" = "failure" ]; then
            echo ""
            echo "❌ DEPLOYMENT MARKED FAILED: smoke-test job failed"
            echo "   API was unreachable on all endpoints after all retries."
            echo "   This is a real production failure — investigate immediately."
            exit 1
          fi

      - name: Write final step summary
        if: always()
        run: |
          W="${{ needs.deploy-workers.result }}"
          F="${{ needs.deploy-frontend.result }}"
          S="${{ needs.smoke-test.result }}"

          w_icon=$([ "$W" = "success" ] && echo "✅" || ([ "$W" = "skipped" ] && echo "⏭️" || echo "❌"))
          f_icon=$([ "$F" = "success" ] && echo "✅" || ([ "$F" = "skipped" ] && echo "⏭️" || echo "❌"))
          s_icon=$([ "$S" = "success" ] && echo "✅" || ([ "$S" = "skipped" ] && echo "⏭️" || echo "❌"))

          echo "## 🚀 Deployment Report — v${{ env.PLATFORM_VERSION }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Service | Status | Endpoint |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|--------|----------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Workers API | ${w_icon} ${W} | [${{ env.PRIMARY_URL }}](${{ env.PRIMARY_URL }}) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Frontend | ${f_icon} ${F} | [${{ env.FRONTEND_URL }}](${{ env.FRONTEND_URL }}) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Smoke Test | ${s_icon} ${S} | All validations |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Platform Version:** \`${{ env.PLATFORM_VERSION }}\`  " >> "$GITHUB_STEP_SUMMARY"
          echo "**Commit:** \`${{ env.DEPLOY_SHA }}\`  " >> "$GITHUB_STEP_SUMMARY"
          echo "**Deployed:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Validation Checklist" >> "$GITHUB_STEP_SUMMARY"
          echo "- [x] Primary endpoint: \`${{ env.PRIMARY_URL }}\` (custom domain, not workers.dev)" >> "$GITHUB_STEP_SUMMARY"
          echo "- [x] Multi-endpoint fallback: custom domain → workers.dev" >> "$GITHUB_STEP_SUMMARY"
          echo "- [x] Exponential backoff: up to 5 attempts per endpoint (5/10/20/40/60s)" >> "$GITHUB_STEP_SUMMARY"
          echo "- [x] Worker route bound to custom domain (header verification)" >> "$GITHUB_STEP_SUMMARY"
          echo "- [x] API health: HTTP 200 + JSON status=ok|degraded enforced" >> "$GITHUB_STEP_SUMMARY"
          echo "- [x] version.json injected with \`${{ env.DEPLOY_SHA }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- [x] Frontend ↔ backend version sync validated" >> "$GITHUB_STEP_SUMMARY"
          echo "- [x] data-build-id stamped on index.html for self-healing" >> "$GITHUB_STEP_SUMMARY"
          echo "- [x] index.html: Cache-Control: no-store (no stale HTML)" >> "$GITHUB_STEP_SUMMARY"
