# =============================================================================
# CYBERDUDEBIVASH AI Security Hub — External Uptime Probe
# =============================================================================
# Closes operational risk R-11: before this workflow, ALL monitoring ran inside
# the platform being monitored (cron-seeded operational_history, /api/uptime).
# A total Worker outage therefore also silenced health recording — customers
# would learn about an outage before the operator did.
#
# This probe runs OUTSIDE the platform (GitHub-hosted runner) every 15 minutes:
#   1. GET /api/health on the primary custom domain, falling back to the
#      workers.dev origin (distinguishes "platform down" from "DNS/proxy down").
#   2. Requires HTTP 200 + a JSON body containing "status" — 3 attempts with
#      backoff before declaring an outage (never false-alarm on a blip).
#   3. On outage: opens (or refreshes) a pinned GitHub issue AND fails the run,
#      which triggers GitHub's scheduled-workflow failure notification to the
#      repository owner.
#
# This is deliberately independent of Telegram/alertEngine — those live inside
# the Worker and share its failure domain.
# =============================================================================

name: External Uptime Probe

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: external-uptime-probe
  cancel-in-progress: true

jobs:
  probe:
    name: Probe production health from outside the platform
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Probe /api/health (primary + fallback origin, 3 attempts, backoff)
        id: probe
        run: |
          set +e
          ENDPOINTS="https://cyberdudebivash.in/api/health https://cyberdudebivash-security-hub.workers.dev/api/health"
          for attempt in 1 2 3; do
            for url in $ENDPOINTS; do
              code=$(curl -sS -m 20 -o /tmp/health.json -w "%{http_code}" "$url" 2>/tmp/curl.err)
              if [ "$code" = "200" ] && grep -q '"status"' /tmp/health.json 2>/dev/null; then
                echo "healthy=true" >> "$GITHUB_OUTPUT"
                echo "via=$url" >> "$GITHUB_OUTPUT"
                echo "✅ Probe OK via $url (attempt $attempt)"
                head -c 400 /tmp/health.json; echo
                {
                  echo "## ✅ External uptime probe — healthy"
                  echo "- Origin: \`$url\` (attempt $attempt)"
                  echo "- $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
                } >> "$GITHUB_STEP_SUMMARY"
                exit 0
              fi
              echo "Attempt $attempt via $url failed (HTTP $code)"
              cat /tmp/curl.err 2>/dev/null || true
            done
            sleep $((attempt * 20))
          done
          echo "healthy=false" >> "$GITHUB_OUTPUT"
          {
            echo "## 🔴 External uptime probe — OUTAGE"
            echo "All endpoints failed 3 attempts at $(date -u +'%Y-%m-%dT%H:%M:%SZ')."
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0  # failure is decided in the last step, after the issue is filed

      - name: Open or refresh the outage issue
        if: steps.probe.outputs.healthy == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          title="🔴 External uptime probe: production /api/health failing"
          now=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          body=$(printf '%s\n\n%s\n\n%s' \
            "The external probe could not reach a healthy /api/health on the custom domain OR the workers.dev fallback (3 attempts each, with backoff) at ${now}." \
            "Run: ${run_url}" \
            "Triage: INCIDENT_RESPONSE_RUNBOOK.md (severity ladder), then DEPLOY_RECOVERY_RUNBOOK.md if a deploy is implicated. This issue auto-refreshes while the outage persists; close it once production is healthy.")
          existing=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open --search "External uptime probe in:title" --json number --jq '.[0].number' || true)
          if [ -n "$existing" ] && [ "$existing" != "null" ]; then
            gh issue comment "$existing" --repo "$GITHUB_REPOSITORY" --body "Still failing at ${now} — run ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          else
            gh issue create --repo "$GITHUB_REPOSITORY" --title "$title" --body "$body"
          fi

      - name: Fail the run on outage (drives owner notification)
        if: steps.probe.outputs.healthy == 'false'
        run: |
          echo "::error::Production health probe failed from an external vantage point."
          exit 1
