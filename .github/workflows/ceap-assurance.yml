# =============================================================================
# CYBERDUDEBIVASH AI Security Hub — CEAP Synthetic Customer Assurance
# =============================================================================
# Continuous Enterprise Assurance Program: re-executes the representative
# paying-customer lifecycle against LIVE PRODUCTION every 6 hours, exactly as
# a customer would (public workflows, throwaway account, full cleanup).
#
# Why: the Incident Review Register (OPERATIONAL_EXCELLENCE_REPORT.md §4)
# shows both production incidents to date were detected by customers/audits,
# not monitoring. This closes the customer-journey half of that gap (CI-1's
# error-rate alerting remains separately on the backlog): a failing run here
# means a customer-facing regression is live — treat it as a production
# incident per INCIDENT_RESPONSE_RUNBOOK.md.
#
# The sweep covers: health/version, signup+key issue, entitlement truth,
# scan id-contract, report generation, AI grounding + paid gate, org
# dashboard + org scans (IR-1), key rotation, credential recovery with
# enumeration safety (IR-2), pricing consistency, offboarding + lockout.
# =============================================================================

name: CEAP Synthetic Customer Assurance

on:
  schedule:
    - cron: "17 */6 * * *" # every 6 hours (offset to avoid top-of-hour load)
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ceap-assurance
  cancel-in-progress: false

jobs:
  sweep:
    name: Live customer-lifecycle sweep
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Run the CEAP sweep against production
        run: node scripts/ceap-sweep.mjs | tee /tmp/ceap.out

      - name: Write summary
        if: always()
        run: |
          {
            echo "## CEAP sweep — ${{ job.status }}"
            echo '```'
            cat /tmp/ceap.out 2>/dev/null || echo "no output captured"
            echo '```'
            echo "A FAIL line = live customer-facing regression. Treat as a production incident (INCIDENT_RESPONSE_RUNBOOK.md); the failing step names the journey."
          } >> "$GITHUB_STEP_SUMMARY"
