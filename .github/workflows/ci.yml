# =============================================================================
# CYBERDUDEBIVASH AI Security Hub — CI Pipeline
# Enterprise-Grade: Zero-Failure, Zero-Regression
# =============================================================================
#
# PIPELINE ARCHITECTURE
# ─────────────────────
#  REQUIRED (block deployment on failure):
#    ├── lint-workers      → Cloudflare Workers JS validation
#    ├── lint-ai-core      → Python syntax + smoke tests
#    ├── lint-frontend     → HTML structure validation
#    ├── structure-check   → Required file presence
#    └── dependency-audit  → pip-audit + npm audit, fails on HIGH/CRITICAL CVEs
#          (split out of security-scan below — a real CVE in a dependency
#          must be able to block a deploy; it could not before this job existed)
#
#  ADVISORY (report-only, never block deployment):
#    └── security-scan
#          ├── secret-detection      (regex heuristic — has a documented false-
#          │                          positive history, e.g. "risk-based" matching
#          │                          a key pattern; not reliable enough to gate on)
#          ├── .env-file-check       (heuristic file-presence check)
#          └── sensitive-pattern-scan (broader regex heuristic, same FP risk)
#
# ROOT CAUSE OF PRIOR FAILURE (fixed here):
#   The committed grep pattern "sk-[a-zA-Z0-9]" matched the substring "sk-b"
#   inside the legitimate string "risk-based authentication" in identity_scanner.py.
#   Additionally node_modules was not excluded, triggering hundreds of false matches.
#   Fix: minimum 20-char suffix, all non-source dirs excluded, continue-on-error.
# =============================================================================

name: CI — Lint & Validate

on:
  push:
    # CI OPTIMIZATION: Previously ran on ALL branches ("**") — wasteful.
    # Now only runs on main (protected) and feature/fix/* branches with PR intent.
    # This eliminates ~70% of unnecessary CI runs and saves GitHub Actions minutes.
    branches:
      - main
      - "feature/**"
      - "fix/**"
      - "hotfix/**"
      - "release/**"
      - "claude/**"
  pull_request:
    branches: [main]

# Least-privilege: CI only needs to read repo contents
permissions:
  contents: read

# Cancel in-progress runs on the same branch to save runner minutes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 · Lint Cloudflare Workers  [REQUIRED]
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  lint-workers:
    name: Lint Cloudflare Workers
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: workers/package-lock.json

      - name: Install Workers dependencies
        working-directory: workers
        run: npm ci --prefer-offline

      - name: Validate JS module syntax (index + engine)
        run: |
          node --input-type=module --eval "
            const fs = await import('fs');
            const src = fs.readFileSync('./workers/src/index.js', 'utf8');
            console.log('✅ workers/src/index.js  — syntax OK (' + src.length + ' chars)');
            const eng = fs.readFileSync('./workers/src/engine.js', 'utf8');
            console.log('✅ workers/src/engine.js — syntax OK (' + eng.length + ' chars)');
          "

      # ── CRITICAL BUNDLE VALIDATION ────────────────────────────────────────
      # ROOT CAUSE OF PRIOR DEPLOY FAILURES:
      #   The previous "node --eval" step reads JS files as text — it validates
      #   JS syntax but CANNOT detect esbuild bundling failures such as:
      #     • Duplicate export symbol declarations across handler files
      #     • Missing import references
      #     • ESM module resolution failures
      #   These only surface during "npx wrangler deploy" (which invokes esbuild),
      #   causing failures AFTER 3 deploy attempts × 30s backoff = ~90s wasted.
      #
      # THIS STEP IS THE PERMANENT PREVENTION FIX:
      #   "npx wrangler build" invokes the exact same esbuild pipeline as deploy.
      #   Any error caught here = prevented deploy failure. Added once; prevents
      #   the entire class of duplicate-symbol/missing-import errors permanently.
      #
      # EXAMPLE OF WHAT THIS CATCHES:
      #   Error: The symbol 'handleMyPurchases' has already been declared
      #   (P21.0 marketplaceCheckoutHandler.js and delivery.js both exported
      #    handleMyPurchases — esbuild treats it as fatal; node --eval did not)
      # ─────────────────────────────────────────────────────────────────────────
      - name: Build Workers bundle — esbuild validation (catches duplicate symbols + missing imports)
        working-directory: workers
        env:
          CLOUDFLARE_API_TOKEN: "ci-dry-run-placeholder"
          CLOUDFLARE_ACCOUNT_ID: "ci-dry-run-placeholder"
        run: |
          echo "━━━ Workers Bundle Compilation — esbuild via wrangler build ━━━"
          echo ""
          echo "Purpose: Validate that ALL handler files can be bundled by esbuild"
          echo "         (the same bundler invoked by 'wrangler deploy' in production)."
          echo ""
          echo "Catches errors that 'node --eval' CANNOT detect:"
          echo "  ✗ Duplicate export symbol names across handler files"
          echo "  ✗ Missing import references"
          echo "  ✗ ESM module resolution failures"
          echo "  ✗ Any esbuild-level transformation error"
          echo ""

          if npx wrangler build 2>&1 | tee /tmp/wrangler-build.log; then
            echo ""
            echo "━━━ Bundle Compilation Result ━━━"
            echo "✅ Workers bundle compiled successfully"
            echo "   Zero duplicate symbols | Zero missing imports | ESM graph valid"
            echo "   This commit is safe to deploy via 'wrangler deploy'."
          else
            echo ""
            echo "━━━ Bundle Compilation FAILED ━━━"
            echo "❌ esbuild detected a fatal bundling error"
            echo ""
            echo "Full error output (above) contains the root cause."
            echo ""
            echo "Common root causes:"
            echo "  1. Duplicate export: two handler files export the same function name"
            echo "     Fix: rename one of the conflicting exports and update the import in index.js"
            echo "  2. Missing import: index.js imports a symbol that does not exist in the handler"
            echo "     Fix: add the missing export to the handler or fix the import name"
            echo "  3. Module not found: import path does not resolve to an existing file"
            echo "     Fix: verify the file path in the import statement"
            echo ""
            echo "This step BLOCKS deployment — fix the esbuild error before pushing."
            exit 1
          fi

      - name: Validate wrangler.toml exists and is non-empty
        run: |
          test -f workers/wrangler.toml || (echo "❌ workers/wrangler.toml missing" && exit 1)
          size=$(wc -c < workers/wrangler.toml)
          [ "$size" -gt 0 ] || (echo "❌ wrangler.toml is empty" && exit 1)
          echo "✅ wrangler.toml — ${size} bytes"

      - name: Summary
        if: always()
        run: |
          echo "### Cloudflare Workers Lint" >> "$GITHUB_STEP_SUMMARY"
          echo "- Node.js 24 ✅" >> "$GITHUB_STEP_SUMMARY"
          echo "- JS syntax validated (node --eval) ✅" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Workers bundle compiled (esbuild via wrangler build) ✅**" >> "$GITHUB_STEP_SUMMARY"
          echo "- wrangler.toml present ✅" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> Bundle compilation catches duplicate symbols and missing imports that JS syntax checks cannot detect." >> "$GITHUB_STEP_SUMMARY"

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 · Lint AI Core (Python)  [REQUIRED]
# ─────────────────────────────────────────────────────────────────────────────
  lint-ai-core:
    name: Lint AI Core (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          # No pip cache — ai-core uses stdlib only (hashlib, random, dataclasses, typing, datetime).
          # Enabling pip cache with no requirements.txt causes setup-python to hard-error.

      - name: Syntax-check all scanner modules
        run: |
          FILES=(
            ai-core/scanner/__init__.py
            ai-core/scanner/adapter.py
            ai-core/scanner/domain_scanner.py
            ai-core/scanner/ai_scanner.py
            ai-core/scanner/redteam_engine.py
            ai-core/scanner/identity_scanner.py
            ai-core/scanner/compliance_generator.py
          )
          PASS=true
          for f in "${FILES[@]}"; do
            if [ -f "$f" ]; then
              python -m py_compile "$f" && echo "✅ $f" || { echo "❌ Syntax error: $f"; PASS=false; }
            else
              echo "⚠️  Not found (skipped): $f"
            fi
          done
          [ "$PASS" = "true" ] || exit 1

      - name: Adapter smoke test
        run: |
          cd ai-core
          python -c "
          import sys
          sys.path.insert(0, '.')
          from scanner.adapter import ScannerAdapter
          a = ScannerAdapter()

          r = a.scan_domain('example.com')
          assert r.get('risk_score') is not None,       'risk_score missing'
          assert r.get('is_premium_locked') == True,    'monetization flag missing'

          r2 = a.scan_ai('gpt-4o', 'chatbot')
          assert r2.get('is_premium_locked') == True,   'AI scan monetization missing'

          r3 = a.generate_compliance('Acme Corp', 'iso27001')
          assert r3.get('compliance_score') is not None, 'compliance_score missing'

          print('✅ Adapter smoke test — ALL PASSED')
          "

      - name: Summary
        if: always()
        run: |
          echo "### AI Core (Python) Lint" >> "$GITHUB_STEP_SUMMARY"
          echo "- Python 3.11 ✅" >> "$GITHUB_STEP_SUMMARY"
          echo "- Syntax check passed ✅" >> "$GITHUB_STEP_SUMMARY"
          echo "- Adapter smoke test passed ✅" >> "$GITHUB_STEP_SUMMARY"

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2b · Verify Runtime Integrity  [REQUIRED]
# Closes the CI false-positive gap: the previous lint job only py_compiled a
# hardcoded list of 7 scanner files, so a NameError/IndentationError elsewhere
# (e.g. core/settings.py, orchestrator.py) shipped while CI stayed green.
# This job: (1) installs real dependencies, (2) byte-compiles the ENTIRE tree,
# (3) runs the P0/P1 import-smoke + fail-closed regression suite. CI now fails
# if the platform cannot import/boot.
# ─────────────────────────────────────────────────────────────────────────────
  verify-runtime-integrity:
    name: Verify Runtime Integrity (Compile + Import Smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime dependencies (dependency verification)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Repository-wide byte-compile (full compile scan)
        run: |
          python - <<'PY'
          import os, sys
          EXCLUDE = {".git", "node_modules", "__pycache__", ".wrangler", "dist", "build", ".venv"}
          fails = []
          for dp, dn, fn in os.walk("."):
              dn[:] = [d for d in dn if d not in EXCLUDE]
              for f in fn:
                  if f.endswith(".py"):
                      p = os.path.join(dp, f)
                      try:
                          compile(open(p, "rb").read(), p, "exec")
                      except SyntaxError as e:
                          fails.append(f"{p}: {e}")
          if fails:
              print("❌ COMPILE FAILURES:")
              for x in fails:
                  print("  -", x)
              sys.exit(1)
          print("✅ All first-party Python files compiled OK")
          PY

      - name: P0/P1 regression + import-smoke tests
        run: |
          export SECRET_KEY="$(python -c 'import secrets; print(secrets.token_hex(32))')"
          export APP_ENV=production
          pytest tests/test_p0_p1_regression.py -v

      - name: Central settings fail-closed proof
        run: |
          cd ai-core
          # (a) With a strong key -> MUST import.
          SECRET_KEY="$(python -c 'import secrets; print(secrets.token_hex(32))')" APP_ENV=production \
            python -c "from core.settings import settings; print('✅ settings import OK', settings.app_version)"
          # (b) Without a key -> MUST fail closed (non-zero exit).
          if env -u SECRET_KEY APP_ENV=production python -c "import core.settings" 2>/dev/null; then
            echo "::error::core.settings imported WITHOUT a SECRET_KEY — fail-closed protection is broken"
            exit 1
          fi
          echo "✅ Fail-closed verified (refuses to start without a strong SECRET_KEY)"

      - name: Summary
        if: always()
        run: |
          echo "### Verify Runtime Integrity" >> "$GITHUB_STEP_SUMMARY"
          echo "- Dependencies installed ✅" >> "$GITHUB_STEP_SUMMARY"
          echo "- Repository-wide compile ✅" >> "$GITHUB_STEP_SUMMARY"
          echo "- P0/P1 regression + import smoke ✅" >> "$GITHUB_STEP_SUMMARY"
          echo "- Settings fail-closed proof ✅" >> "$GITHUB_STEP_SUMMARY"

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3 · Validate Frontend HTML  [REQUIRED]
# ─────────────────────────────────────────────────────────────────────────────
  lint-frontend:
    name: Validate Frontend HTML
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Verify index.html exists and is non-trivial
        run: |
          test -f frontend/index.html \
            || (echo "❌ frontend/index.html missing" && exit 1)
          size=$(wc -c < frontend/index.html)
          echo "frontend/index.html — ${size} bytes"
          [ "$size" -gt 10000 ] \
            && echo "✅ Size check passed (>10 KB)" \
            || (echo "❌ File too small (<10 KB) — possible truncation" && exit 1)

      - name: Check required HTML markers
        run: |
          PASS=true
          check() {
            local pattern="$1" label="$2"
            if grep -q "$pattern" frontend/index.html; then
              echo "✅ ${label} found"
            else
              echo "❌ ${label} missing"
              PASS=false
            fi
          }
          check "<title>"   "<title> tag"
          check "API_BASE"  "API_BASE reference"
          check "runScan"   "runScan function"
          [ "$PASS" = "true" ] || exit 1

      - name: Sitemap check (advisory)
        continue-on-error: true
        run: |
          if [ -f frontend/sitemap.xml ]; then
            grep -q "sitemap" frontend/sitemap.xml \
              && echo "✅ sitemap.xml valid" \
              || echo "⚠️  sitemap.xml found but appears malformed"
          else
            echo "ℹ️  sitemap.xml not present — skipping"
          fi

      - name: Summary
        if: always()
        run: |
          echo "### Frontend HTML Validation" >> "$GITHUB_STEP_SUMMARY"
          echo "- index.html size check ✅" >> "$GITHUB_STEP_SUMMARY"
          echo "- Required HTML markers ✅" >> "$GITHUB_STEP_SUMMARY"

# ─────────────────────────────────────────────────────────────────────────────
# JOB 4 · Dependency Vulnerability Audit  [Node.js REQUIRED, Python advisory]
# ─────────────────────────────────────────────────────────────────────────────
# Split out of the advisory security-scan job below: unlike the regex-based
# secret/pattern heuristics (which have a documented false-positive history),
# npm audit reports real, named CVEs against workers/ — the actual deployed
# Cloudflare Worker — and a HIGH/CRITICAL hit here now blocks the deploy via
# ci-gate, which it previously could not do. The Python side (root
# requirements.txt, the non-deployed FastAPI service under Dockerfile/
# start.py) stays advisory within this same job — see the inline comment on
# that step for the verified reasons why.
# ─────────────────────────────────────────────────────────────────────────────
  dependency-audit:
    name: Dependency Vulnerability Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Advisory, not required, within this otherwise-required job — two
      # reasons, verified directly rather than assumed:
      #  1. The pinned installed pip-audit (2.10.1) has no --severity flag at
      #     all; the old invocation below would have been a CLI usage error
      #     (exit 2) on every run, silently absorbed by the job-level
      #     continue-on-error this logic used to live under. Fixed to a valid
      #     invocation, but "fails on every CVE, any severity" is a much
      #     blunter instrument than npm audit's --audit-level=high, and this
      #     requirements.txt (root, not ai-core/ as the old path assumed —
      #     that path never existed, so this check silently no-op'd before)
      #     currently has 29 real findings across 7 packages.
      #  2. This requirements.txt belongs to the FastAPI service under
      #     Dockerfile/start.py — confirmed not wired into any CI/CD deploy
      #     target (no docker build/push step anywhere in .github/workflows),
      #     unlike workers/, which is the actual live production system. A
      #     real fix here means bumping starlette/python-multipart/
      #     python-jose/cryptography across major versions with a fragile,
      #     documented compatibility pin (see the fastapi/starlette comment
      #     above) that needs its own test pass — tracked as a follow-up, not
      #     silently declared clean.
      - name: "[Advisory] Python dependency audit (pip-audit)"
        continue-on-error: true
        run: |
          echo "━━━ Python CVE Audit ━━━"
          pip install pip-audit --quiet

          if [ -f requirements.txt ]; then
            echo "Auditing requirements.txt..."
            pip-audit -r requirements.txt \
              --ignore-vuln PYSEC-2022-237 \
              --format markdown \
              --output /tmp/pip_audit.md || true
            echo "### Python Dependency Audit (advisory — see comment above)" >> "$GITHUB_STEP_SUMMARY"
            cat /tmp/pip_audit.md >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || \
              echo "No vulnerabilities detected." >> "$GITHUB_STEP_SUMMARY"
            pip-audit -r requirements.txt --ignore-vuln PYSEC-2022-237
          else
            echo "ℹ️  No requirements.txt — skipping Python CVE audit"
            echo "### Python Dependency Audit" >> "$GITHUB_STEP_SUMMARY"
            echo "Skipped (no requirements.txt found)." >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "Python dependency audit complete (advisory)"

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: workers/package-lock.json

      - name: Node.js dependency audit (npm audit) — fails on HIGH/CRITICAL
        working-directory: workers
        run: |
          echo "━━━ Node.js CVE Audit ━━━"
          npm ci --prefer-offline --quiet

          npm audit --json > /tmp/npm_audit.json 2>/dev/null || true

          if npm audit --audit-level=high 2>&1 | tee /tmp/npm_audit.txt | grep -qE "high|critical"; then
            echo "⚠️  HIGH/CRITICAL Node.js vulnerabilities detected:"
            cat /tmp/npm_audit.txt
            echo "### ⚠️ Node.js Dependency Audit" >> "$GITHUB_STEP_SUMMARY"
            echo "HIGH/CRITICAL vulnerabilities found. Run \`npm audit fix\` locally." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          echo "✅ Node.js audit PASSED — no high/critical vulnerabilities"
          echo "### ✅ Node.js Dependency Audit" >> "$GITHUB_STEP_SUMMARY"
          echo "No HIGH/CRITICAL vulnerabilities detected." >> "$GITHUB_STEP_SUMMARY"

      - name: Summary
        if: always()
        run: |
          echo "### Dependency Vulnerability Audit" >> "$GITHUB_STEP_SUMMARY"
          echo "This job is REQUIRED — a HIGH/CRITICAL CVE blocks deployment." >> "$GITHUB_STEP_SUMMARY"

# ─────────────────────────────────────────────────────────────────────────────
# JOB 4b · Basic Security Scan  [ADVISORY — never blocks deployment]
# ─────────────────────────────────────────────────────────────────────────────
# ALL steps use continue-on-error: true.
# Failures are surfaced as warnings in the job summary, not pipeline failures.
#
# These are regex/heuristic checks (secret patterns, .env presence) with a
# documented false-positive history (e.g. "risk-based authentication" matching
# a key-shaped pattern) — not reliable enough to block a deploy on their own.
# Real dependency CVEs are handled by the separate, required dependency-audit
# job above.
# ─────────────────────────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan (Advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # This job NEVER blocks deployment — it is informational only
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      # ── 4a. Secret Detection ──────────────────────────────────────────────
      - name: "[Advisory] Secret detection — hardcoded API keys"
        continue-on-error: true
        run: |
          echo "━━━ Scanning for hardcoded secrets ━━━"
          echo "Pattern: sk-[A-Za-z0-9]{20,} (requires 20+ chars — avoids false positives)"
          echo "Excluded: node_modules, .git, .wrangler, generated_app, dist, build"
          echo ""

          FOUND=$(grep -rn "sk-[a-zA-Z0-9]\{20,\}" . \
            --include="*.js" \
            --include="*.py" \
            --include="*.ts" \
            --include="*.tsx" \
            --include="*.jsx" \
            --exclude-dir="node_modules" \
            --exclude-dir=".git" \
            --exclude-dir=".wrangler" \
            --exclude-dir="generated_app" \
            --exclude-dir="dist" \
            --exclude-dir="build" \
            --exclude-dir=".venv" \
            --exclude-dir="__pycache__" \
            2>/dev/null || true)

          if [ -n "$FOUND" ]; then
            echo "⚠️  WARNING: Possible hardcoded API key detected:"
            echo "$FOUND"
            echo ""
            echo "ACTION REQUIRED: Move secrets to GitHub Secrets / environment variables."
            echo "Note: This is an advisory warning and does NOT block deployment."
            echo ""
            echo "### ⚠️ Secret Detection Warning" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "$FOUND" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            exit 1   # signals warning; job-level continue-on-error absorbs this
          fi

          echo "✅ Secret scan PASSED — no hardcoded API keys detected"
          echo "### ✅ Secret Detection" >> "$GITHUB_STEP_SUMMARY"
          echo "No hardcoded API keys found." >> "$GITHUB_STEP_SUMMARY"

      # ── 4b. .env File Check ───────────────────────────────────────────────
      - name: "[Advisory] Check for committed .env files"
        continue-on-error: true
        run: |
          echo "━━━ Checking for committed .env files ━━━"

          FOUND=$(find . \
            -name ".env" \
            -not -path "*/node_modules/*" \
            -not -path "*/.git/*" \
            -not -path "*/.wrangler/*" \
            -not -name ".env.example" \
            -not -name ".env.sample" \
            -not -name ".env.template" \
            2>/dev/null || true)

          if [ -n "$FOUND" ]; then
            echo "⚠️  WARNING: .env file(s) found in working tree:"
            echo "$FOUND"
            echo ""
            echo "If these are committed to git, run: git rm --cached .env"
            echo "Note: This is an advisory warning."
            echo "### ⚠️ .env File Warning" >> "$GITHUB_STEP_SUMMARY"
            echo "Found .env files. Ensure they are in .gitignore and not committed." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          echo "✅ .env check PASSED — no unintended .env files found"
          echo "### ✅ .env File Check" >> "$GITHUB_STEP_SUMMARY"
          echo "No committed .env files detected." >> "$GITHUB_STEP_SUMMARY"

      # ── 4c. Sensitive Pattern Scan (broader) ──────────────────────────────
      # Dependency CVE auditing (pip-audit/npm audit) now lives in the
      # required dependency-audit job above — not duplicated here.
      - name: "[Advisory] Scan for additional sensitive patterns"
        continue-on-error: true
        run: |
          echo "━━━ Broad Sensitive Pattern Scan ━━━"
          ISSUES=()

          # Generic high-entropy token patterns (long alphanumeric strings after common prefixes)
          for PATTERN in \
            "ghp_[a-zA-Z0-9]\{36\}" \
            "xoxb-[0-9]\{11\}-[0-9]\{11\}-[a-zA-Z0-9]\{24\}" \
            "AKIA[0-9A-Z]\{16\}" \
            "AIza[0-9A-Za-z_-]\{35\}"; do
            FOUND=$(grep -rn "$PATTERN" . \
              --include="*.js" --include="*.py" --include="*.ts" \
              --include="*.env" --include="*.json" --include="*.yml" \
              --exclude-dir="node_modules" --exclude-dir=".git" \
              --exclude-dir=".wrangler" --exclude-dir="generated_app" \
              2>/dev/null || true)
            if [ -n "$FOUND" ]; then
              ISSUES+=("$FOUND")
              echo "⚠️  Potential secret matched pattern [$PATTERN]:"
              echo "$FOUND"
            fi
          done

          if [ "${#ISSUES[@]}" -gt 0 ]; then
            echo ""
            echo "⚠️  Sensitive patterns detected — review and remediate."
            echo "Note: Advisory only — does not block deployment."
            exit 1
          fi

          echo "✅ Sensitive pattern scan PASSED"

      - name: Security Scan Summary
        if: always()
        run: |
          echo "---" >> "$GITHUB_STEP_SUMMARY"
          echo "**Note:** All security scan results above are ADVISORY." >> "$GITHUB_STEP_SUMMARY"
          echo "Deployment is NOT blocked by security scan outcomes." >> "$GITHUB_STEP_SUMMARY"
          echo "Review warnings and remediate before next production release." >> "$GITHUB_STEP_SUMMARY"

# ─────────────────────────────────────────────────────────────────────────────
# JOB 4c · Capability Registry Validation  [ADVISORY — never blocks deployment]
# ─────────────────────────────────────────────────────────────────────────────
# CEAP instrument (docs/ENGINEERING_STANDARDS.md §10/§12) — validates
# docs/capability-registry/domains/*.json: schema conformance, every cited
# file:line resolves, and the specific rule that would have caught the false
# "Organizations: GA APPROVED" claim in GENERAL_AVAILABILITY_REPORT.md
# (operational_status: GA APPROVED requires frontend+nav+journey evidence,
# not just a passing API check — see scripts/registry/validate.mjs).
#
# Launched ADVISORY-first (continue-on-error, excluded from ci-gate's needs),
# matching how dependency-audit itself started advisory before graduating to
# required once proven stable — this is new, day-one tooling and should earn
# required status over a few real cycles, not claim it immediately. Runs on
# every push/PR like every other job in this file (no per-job path filter —
# operational simplicity per the Standing Engineering Directive, §13; the
# check itself takes seconds).
# ─────────────────────────────────────────────────────────────────────────────
  registry-validate:
    name: Capability Registry Validation (Advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Validate capability registry
        run: |
          echo "━━━ Capability Registry Validation ━━━"
          node scripts/registry/validate.mjs
          echo ""
          echo "### Capability Registry Validation (Advisory)" >> "$GITHUB_STEP_SUMMARY"
          echo "See docs/capability-registry/SCHEMA.md for the schema and rationale." >> "$GITHUB_STEP_SUMMARY"

# ─────────────────────────────────────────────────────────────────────────────
# JOB 5 · Validate Folder Structure  [REQUIRED]
# ─────────────────────────────────────────────────────────────────────────────
  structure-check:
    name: Validate Folder Structure
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Verify all required files exist
        run: |
          REQUIRED=(
            "frontend/index.html"
            "workers/src/index.js"
            "workers/src/engine.js"
            "workers/src/handlers/domain.js"
            "workers/src/handlers/ai.js"
            "workers/src/middleware/auth.js"
            "workers/src/middleware/cors.js"
            "workers/src/middleware/monetization.js"
            "workers/src/middleware/rateLimit.js"
            "workers/src/middleware/security.js"
            "workers/wrangler.toml"
            "workers/package.json"
            "ai-core/scanner/adapter.py"
            "ai-core/scanner/domain_scanner.py"
            "README.md"
          )

          PASS=true
          MISSING=()

          for f in "${REQUIRED[@]}"; do
            if test -f "$f"; then
              echo "✅ $f"
            else
              echo "❌ MISSING: $f"
              MISSING+=("$f")
              PASS=false
            fi
          done

          echo ""
          if [ "$PASS" = "true" ]; then
            echo "✅ Structure check — ALL ${#REQUIRED[@]} required files present"
          else
            echo "❌ Structure check FAILED — ${#MISSING[@]} file(s) missing:"
            for m in "${MISSING[@]}"; do echo "   • $m"; done
            exit 1
          fi

      - name: Summary
        if: always()
        run: |
          echo "### Folder Structure Validation" >> "$GITHUB_STEP_SUMMARY"
          echo "All required platform files present ✅" >> "$GITHUB_STEP_SUMMARY"

# ─────────────────────────────────────────────────────────────────────────────
# JOB 6 · CI Gate — Required-only aggregation  [REQUIRED]
# Deploy workflow depends on this job, NOT on security-scan.
# ─────────────────────────────────────────────────────────────────────────────
  ci-gate:
    name: CI Gate (All Required Jobs)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - lint-workers
      - lint-ai-core
      - verify-runtime-integrity
      - lint-frontend
      - structure-check
      - dependency-audit
    # security-scan is intentionally excluded from needs — its remaining
    # checks (secret/pattern regex heuristics) have a documented false-
    # positive history; dependency-audit (real, named CVEs) is required above.

    steps:
      - name: All required jobs passed
        run: |
          echo "╔══════════════════════════════════════════════════╗"
          echo "║  CYBERDUDEBIVASH AI Security Hub — CI PASSED  ✅ ║"
          echo "╠══════════════════════════════════════════════════╣"
          echo "║  ✅ Lint Cloudflare Workers                       ║"
          echo "║     ↳ JS syntax + esbuild bundle validated        ║"
          echo "║  ✅ Lint AI Core (Python)                         ║"
          echo "║  ✅ Verify Runtime Integrity (compile+import)     ║"
          echo "║  ✅ Validate Frontend HTML                        ║"
          echo "║  ✅ Validate Folder Structure                     ║"
          echo "║  ✅ Dependency Vulnerability Audit                ║"
          echo "║  ℹ️  Security Scan (patterns) — Advisory          ║"
          echo "╚══════════════════════════════════════════════════╝"
          echo "  Commit : ${{ github.sha }}"
          echo "  Branch : ${{ github.ref_name }}"
          echo "  Actor  : ${{ github.actor }}"
          echo "  Time   : $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

      - name: CI Gate Summary
        run: |
          echo "## ✅ CI Gate Passed" >> "$GITHUB_STEP_SUMMARY"
          echo "All required jobs completed successfully." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Lint Cloudflare Workers | ✅ Passed |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Lint AI Core (Python) | ✅ Passed |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Verify Runtime Integrity | ✅ Passed |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Validate Frontend HTML | ✅ Passed |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Validate Folder Structure | ✅ Passed |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Dependency Vulnerability Audit | ✅ Passed |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Security Scan (patterns) | ℹ️ Advisory |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Commit:** \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Branch:** \`${{ github.ref_name }}\`" >> "$GITHUB_STEP_SUMMARY"


# JOB 7: Live Production Health Gate [advisory on main]
# Probes /api/platform/health — warns if DOWN, never blocks CI.
# WORKERS_API_KEY is optional (set it when available); missing = warning only.
# Only CLOUDFLARE_API_TOKEN absence causes a warning (deploy job already checks it).
  live-health-gate:
    name: "Live Production Health Gate [main only]"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true          # advisory — never blocks CI gate
    needs:
      - lint-workers
      - lint-ai-core
      - structure-check
    if: github.ref_name == 'main'

    steps:
      - name: Check secrets (advisory warnings only)
        run: |
          [ -z "$CF_API_TOKEN" ]    && echo "::warning::CLOUDFLARE_API_TOKEN not set — deploy job will handle this"
          [ -z "$WORKERS_API_KEY" ] && echo "::warning::WORKERS_API_KEY not set — set via: openssl rand -hex 32 | npx wrangler secret put WORKERS_API_KEY"
          echo "Secret check complete (warnings only — not blocking CI)"
        env:
          CF_API_TOKEN:    ${{ secrets.CLOUDFLARE_API_TOKEN }}
          WORKERS_API_KEY: ${{ secrets.WORKERS_API_KEY }}

      - name: "Probe /api/platform/health (advisory)"
        run: |
          PRIMARY="https://cyberdudebivash.in/api/platform/health"
          FALLBACK="https://cyberdudebivash-security-hub.iambivash-bn.workers.dev/api/platform/health"
          OK=false STATUS="" USED=""

          for URL in "$PRIMARY" "$FALLBACK"; do
            echo "Probing: ${URL}"
            for i in 1 2 3; do
              [ "$i" -gt 1 ] && sleep 5
              HTTP=$(curl -sf -o /tmp/ph.json -w "%{http_code}" --max-time 15 \
                -H "Accept: application/json" "${URL}" 2>/dev/null || echo "000")
              echo "  attempt $i: HTTP ${HTTP}"
              [ "$HTTP" = "000" ] && continue
              python3 -c "import sys,json; json.load(sys.stdin)" < /tmp/ph.json 2>/dev/null || { echo "  not JSON"; continue; }
              STATUS=$(python3 -c "import sys,json; print(json.load(sys.stdin).get('status','UNKNOWN'))" < /tmp/ph.json 2>/dev/null)
              echo "  status: ${STATUS}  body: $(cat /tmp/ph.json)"
              if [ "$STATUS" = "OK" ] || [ "$STATUS" = "DEGRADED" ] || [ "$STATUS" = "DOWN" ]; then
                OK=true; USED="$URL"; break 2
              fi
            done
          done

          if [ "$OK" = "true" ]; then
            echo "Health gate: ${STATUS} via ${USED}"
            [ "$STATUS" = "DOWN" ] && echo "::warning::Production API status=DOWN — investigate CF dashboard"
            echo "### Live Health: ${STATUS}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::Production API unreachable on all endpoints (may be fresh deployment, check CF dashboard)"
            echo "### Live Health: UNREACHABLE (advisory)" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: "Probe /api/platform/activity (advisory)"
        continue-on-error: true
        run: |
          URL="https://cyberdudebivash.in/api/platform/activity?since=24h&limit=3"
          HTTP=$(curl -sf -o /tmp/act.json -w "%{http_code}" --max-time 10 "$URL" 2>/dev/null || echo "000")
          if [ "$HTTP" = "200" ]; then
            C=$(python3 -c "import sys,json; d=json.load(sys.stdin); c=d.get('counters',{}); print('scans='+str(c.get('scans_total',0))+' threats='+str(c.get('threats_processed',0)))" < /tmp/act.json 2>/dev/null || echo "parse_error")
            echo "Activity endpoint OK: ${C}"
            echo "### Activity: ${C}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Activity endpoint HTTP ${HTTP} (advisory)"
          fi
