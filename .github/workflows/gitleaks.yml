# ============================================================================
# Secret-scanning gate - prevents any plaintext credential from being merged.
# INSTALL: copy to .github/workflows/gitleaks.yml
# Closes the prevention gap behind the ADMIN_KEY incident (P1).
# Scans the full history on push/PR and fails the build on any finding.
# ============================================================================
name: Secret Scan (gitleaks)

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Prevents redundant concurrent scans on the same ref from piling up and
# starving the account's shared runner-concurrency pool (root cause of the
# 2026-07-09 incident: this job queued for ~19 minutes then was cancelled
# before a runner ever picked it up, alongside several Test & Quality Gate
# jobs, when a merge-triggered burst of jobs collided with this repo's very
# high volume of scheduled workflows). Every other CI-adjacent workflow here
# (test.yml, deploy.yml, automation.yml, external-uptime-probe.yml,
# ceap-assurance.yml) already scopes concurrency this way — this file was
# the one gap.
concurrency:
  group: gitleaks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so past commits are scanned too
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # Required by gitleaks-action v2 to scan pull_request events
          # (the action diffs the PR via the GitHub API).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
          # No license needed for public repos.
        # Fails the job (non-zero) if any secret is detected.
