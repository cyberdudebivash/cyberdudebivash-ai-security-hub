# =============================================================================
# CYBERDUDEBIVASH AI Security Hub — Workers Error-Rate Alert
# =============================================================================
# Closes the remaining half of CI-1 (OPERATIONAL_EXCELLENCE_REPORT.md §7):
# the CEAP sweep (ceap-assurance.yml) re-executes a synthetic customer
# journey every 6 hours; this watches real production traffic every 15
# minutes via Cloudflare's GraphQL Analytics API and alerts on a Workers
# runtime error-rate spike in between sweeps — both lifetime incidents
# (Incident Review Register, OPERATIONAL_EXCELLENCE_REPORT.md §4) were
# customer-first detections, not monitoring.
#
# Requires CLOUDFLARE_API_TOKEN (already used by deploy.yml/d1-backup.yml) to
# include the Account Analytics:Read scope — confirm/extend that token before
# relying on this; an unscoped token surfaces as a failed run (MONITOR_ERROR),
# never a silent false "healthy".
#
# Known limitation (stated, not assumed away — see script header): this
# measures Workers runtime errors (uncaught exceptions, exceeded CPU/memory),
# not deliberately-returned 5xx JSON responses from the app's own try/catch
# paths. Closing that gap needs the zone-level httpRequestsAdaptiveGroups
# dataset and a real zone tag — left for a follow-up with owner input.
# =============================================================================

name: Workers Error-Rate Alert

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: error-rate-alert
  cancel-in-progress: true

jobs:
  check:
    name: Check Workers error-rate against production
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Run error-rate check
        id: check
        shell: bash
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set +e
          node scripts/error-rate-alert.mjs | tee /tmp/error-rate.out
          code=${PIPESTATUS[0]}
          echo "code=$code" >> "$GITHUB_OUTPUT"
          {
            echo "## Workers error-rate check"
            echo '```'
            cat /tmp/error-rate.out
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Open or refresh the alert issue (ALERT only)
        if: steps.check.outputs.code == '1'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          title="🔴 Workers error-rate alert: production exception rate elevated"
          now=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          detail=$(cat /tmp/error-rate.out)
          body=$(printf '%s\n\n%s\n\n%s\n\n%s' \
            "The Workers error-rate check found the runtime exception rate above threshold at ${now}." \
            "$detail" \
            "Run: ${run_url}" \
            "Triage: INCIDENT_RESPONSE_RUNBOOK.md (severity ladder). This issue auto-refreshes while the elevated rate persists; close it once the rate is back under threshold.")
          existing=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open --search "Workers error-rate alert in:title" --json number --jq '.[0].number' || true)
          if [ -n "$existing" ] && [ "$existing" != "null" ]; then
            gh issue comment "$existing" --repo "$GITHUB_REPOSITORY" --body "Still elevated at ${now} — run ${run_url}"
          else
            gh issue create --repo "$GITHUB_REPOSITORY" --title "$title" --body "$body"
          fi

      - name: Fail the run on non-OK result (drives owner notification)
        if: steps.check.outputs.code != '0'
        run: |
          case "${{ steps.check.outputs.code }}" in
            2) echo "::error::Error-rate monitor is misconfigured — CLOUDFLARE_API_TOKEN/CLOUDFLARE_ACCOUNT_ID missing or empty." ;;
            3) echo "::error::Error-rate monitor could not get a reliable reading (check CLOUDFLARE_API_TOKEN has Account Analytics:Read scope)." ;;
            *) echo "::error::Workers production error rate exceeded threshold." ;;
          esac
          exit 1
