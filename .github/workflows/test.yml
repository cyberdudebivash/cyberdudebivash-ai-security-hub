# ============================================================================
# CYBERDUDEBIVASH AI Security Hub — Automated Test & Quality Gate
# Closes gap R4 (CI ran lint only). INSTALL: copy to .github/workflows/test.yml
# Adds required gates: unit tests, header/security assertions, Lighthouse, a11y.
# Treats warnings as failures per board policy.
# ============================================================================
name: Test & Quality Gate

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Cancel in-progress test runs on the same ref to save runner minutes
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Unit tests (required) ────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults: { run: { working-directory: workers } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "24", cache: "npm", cache-dependency-path: workers/package-lock.json }
      - run: npm ci || npm install
      - name: Run unit tests
        run: npx vitest run --reporter=dot

  # ── Security header assertions (required) ────────────────────────────────
  header-assert:
    name: Security Header Assertions
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Assert critical headers present in frontend/_headers
        run: |
          set -e
          H=frontend/_headers
          for needle in "Strict-Transport-Security" "X-Frame-Options: DENY" \
            "X-Content-Type-Options: nosniff" "Content-Security-Policy" \
            "Referrer-Policy" "Permissions-Policy"; do
            grep -q "$needle" "$H" || { echo "::error::missing header: $needle"; exit 1; }
          done
          echo "All critical security headers present."

  # ── Accessibility (required) ─────────────────────────────────────────────
  a11y:
    name: Accessibility (axe)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "24" }
      - name: axe-core CLI scan of local build
        # Syncs Chrome to the ChromeDriver version bundled with axe-cli to prevent
        # "session not created" failures when ubuntu-latest ships a newer Chrome.
        # Uses jq (pre-installed on ubuntu-latest) — never python3 -c "..." because
        # Python inline scripts require column-0 code that breaks YAML block-scalar
        # indentation and causes "Invalid workflow file" parse errors.
        run: |
          npm i -g @axe-core/cli@4.11.3

          CD_MAJOR=$(chromedriver --version 2>&1 | grep -oP '(?<=ChromeDriver )\d+' | head -1)
          [ -z "$CD_MAJOR" ] && CD_MAJOR="150"
          echo "ChromeDriver major: $CD_MAJOR"

          CfT_URL=$(curl -sf \
            https://googlechromelabs.github.io/chrome-for-testing/known-good-versions-with-downloads.json \
            | jq -r --argjson m "$CD_MAJOR" \
              '[.versions[] | select((.version|split(".")[0]|tonumber)==$m)] | sort_by(.version|split(".")|map(tonumber)) | last | .downloads.chrome[] | select(.platform=="linux64") | .url' \
            | head -1)

          if [ -n "$CfT_URL" ]; then
            echo "Installing Chrome for Testing: $CfT_URL"
            wget -q "$CfT_URL" -O /tmp/chrome-cft.zip
            unzip -q /tmp/chrome-cft.zip -d /tmp/chrome-cft
            CfT_BIN=$(find /tmp/chrome-cft -name "chrome" -type f | head -1)
            chmod +x "$CfT_BIN"
            sudo ln -sf "$CfT_BIN" /opt/google/chrome/chrome
            echo "Chrome after sync: $(google-chrome --version)"
          else
            echo "No Chrome for Testing URL found for major $CD_MAJOR — using system Chrome"
          fi

          python3 -m http.server 3000 --directory frontend/ &
          SERVER_PID=$!
          echo "Waiting for server on :3000 ..."
          for i in $(seq 1 15); do
            curl -sf http://localhost:3000/ > /dev/null 2>&1 && echo "Server ready (attempt $i)" && break
            sleep 2
          done
          npx @axe-core/cli http://localhost:3000/ --exit || \
            { kill $SERVER_PID 2>/dev/null; echo "::error::Accessibility violations found"; exit 1; }
          kill $SERVER_PID 2>/dev/null
          echo "Accessibility check passed"

  # ── Lighthouse performance gate (required) ───────────────────────────────
  lighthouse:
    name: Lighthouse CI (mobile)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "24" }
      - name: Run Lighthouse CI against local build
        # Uses Python's built-in HTTP server — no serve package, no version drift.
        # Curl health-check loop guarantees server is up before lhci runs.
        # lighthouserc.json: 3 runs / median / no-upload for stable results.
        run: |
          npm i -g @lhci/cli
          python3 -m http.server 3000 --directory frontend/ &
          SERVER_PID=$!
          echo "Waiting for server on :3000 ..."
          for i in $(seq 1 15); do
            curl -sf http://localhost:3000/ > /dev/null 2>&1 && echo "Server ready (attempt $i)" && break
            sleep 2
          done
          lhci autorun --config=lighthouserc.json || \
            { kill $SERVER_PID 2>/dev/null; echo "::error::Lighthouse budget not met"; exit 1; }
          kill $SERVER_PID 2>/dev/null
          echo "✅ Lighthouse CI passed"

  # ── E2E smoke (required) ─────────────────────────────────────────────────
  e2e:
    name: E2E Smoke (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "24" }
      - name: Playwright smoke
        run: |
          npm i -D @playwright/test
          npx playwright install --with-deps chromium
          npx playwright test tests/e2e --reporter=line || \
            { echo "::error::E2E smoke failed"; exit 1; }
