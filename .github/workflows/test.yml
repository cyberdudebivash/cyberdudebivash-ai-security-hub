# ============================================================================
# CYBERDUDEBIVASH AI Security Hub — Automated Test & Quality Gate
# Closes gap R4 (CI ran lint only). INSTALL: copy to .github/workflows/test.yml
# Adds required gates: unit tests, header/security assertions, Lighthouse, a11y.
# Treats warnings as failures per board policy.
# ============================================================================
name: Test & Quality Gate

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Cancel in-progress test runs on the same ref to save runner minutes
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Unit tests (required) ────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults: { run: { working-directory: workers } }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: "24", cache: "npm", cache-dependency-path: workers/package-lock.json }
      - run: npm ci || npm install
      - name: Run unit tests
        run: npx vitest run --reporter=dot

  # ── Security header assertions (required) ────────────────────────────────
  header-assert:
    name: Security Header Assertions
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - name: Assert critical headers present in frontend/_headers
        run: |
          set -e
          H=frontend/_headers
          for needle in "Strict-Transport-Security" "X-Frame-Options: DENY" \
            "X-Content-Type-Options: nosniff" "Content-Security-Policy" \
            "Referrer-Policy" "Permissions-Policy"; do
            grep -q "$needle" "$H" || { echo "::error::missing header: $needle"; exit 1; }
          done
          echo "All critical security headers present."
      - name: Assert CSP script-src actually allows every domain we load a <script> from
        run: |
          set -e
          H=frontend/_headers
          # 2026-07-09: found live in production — connect-src/frame-src/form-action
          # correctly allowlisted Razorpay, but script-src (which gates loading
          # https://checkout.razorpay.com/v1/checkout.js itself) did not. The browser
          # silently CSP-blocked the SDK, so every automated-checkout attempt threw,
          # was caught, and silently fell back to the manual-payment modal — on every
          # page that offers Razorpay checkout (index.html, marketplace-checkout.html,
          # user-dashboard.html). No test caught it because the prior check only
          # asserted the header NAME exists, never its VALUE. Locking the specific
          # domain a <script src="..."> tag in the frontend actually requests, not
          # just "Razorpay is mentioned somewhere in the policy".
          ENFORCED_CSP=$(grep '^  Content-Security-Policy:' "$H")
          SCRIPT_SRC=$(echo "$ENFORCED_CSP" | grep -oE "script-src[^;]*")
          echo "script-src: $SCRIPT_SRC"
          DOMAINS=$(grep -ohE "https://[a-zA-Z0-9.-]+/[a-zA-Z0-9._/-]*checkout\.js" frontend/*.html frontend/assets/*.js 2>/dev/null \
            | grep -oE "https://[a-zA-Z0-9.-]+" | sort -u)
          for domain in $DOMAINS; do
            echo "$SCRIPT_SRC" | grep -qF "$domain" || { echo "::error::a <script src=\"$domain/...checkout.js\"> tag exists in the frontend but '$domain' is not in the enforced CSP's script-src — the browser will silently block it"; exit 1; }
          done
          echo "$SCRIPT_SRC" | grep -qF "https://checkout.razorpay.com" || { echo "::error::script-src must allow https://checkout.razorpay.com (Razorpay Checkout SDK)"; exit 1; }
          echo "CSP script-src covers every checkout-SDK domain actually referenced in the frontend ($DOMAINS)."

  seo-lock:
    name: SEO Structure & Meta Lock
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: "24" }
      - name: Public-page structure lock (head/OG/JSON-LD placement)
        run: node scripts/seo-structure-lock.mjs
      - name: Merchant Center feed price/drift lock
        run: node scripts/merchant-feed-price-lock.mjs
      - name: CVE meta integrity (no truncated/missing/inconsistent tags)
        run: node scripts/repair-cve-meta.mjs --check

  # ── Domain scan engine rule conformance (required) ───────────────────────
  # trust-center.html publishes this result as a public, checkable claim
  # ("N/N documented risk rules verified") in place of an unauditable AI
  # accuracy percentage. This job re-runs the real assertions against the
  # real engine on every build and fails if the committed frontend/data/
  # artifact the page fetches has drifted from a fresh run — the published
  # claim can never silently go stale or diverge from the code it describes.
  domain-engine-conformance:
    name: Domain Engine Rule Conformance
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: "24" }
      - name: Run rule conformance benchmark
        run: node scripts/domain-engine-rule-conformance.mjs
      - name: Fail if the published result no longer matches a fresh run
        # Compares substantive fields only — generated_at legitimately differs
        # on every run and is not itself a drift signal.
        run: |
          COMMITTED=$(git show HEAD:frontend/data/domain-engine-conformance.json | jq -S 'del(.generated_at)')
          FRESH=$(jq -S 'del(.generated_at)' frontend/data/domain-engine-conformance.json)
          if [ "$COMMITTED" != "$FRESH" ]; then
            echo "::error::frontend/data/domain-engine-conformance.json's committed results no longer match a fresh run against the current engine — commit the regenerated file."
            diff <(echo "$COMMITTED") <(echo "$FRESH") || true
            exit 1
          fi
          echo "Committed results match a fresh run — not stale."

  # ── Accessibility (required) ─────────────────────────────────────────────
  a11y:
    name: Accessibility (axe)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: "24" }
      - name: axe-core CLI scan of local build
        # Root-cause analysis of every failure mode this step defends against:
        # 1. YAML syntax: python3 -c requires column-0 code → breaks block-scalar.
        #    Fix: use jq (pre-installed) — all lines stay indented within the block.
        # 2. Wrong ChromeDriver version detected: we were reading `chromedriver` from
        #    PATH (the system binary, v149), but axe-cli bundles its own ChromeDriver
        #    (v150+). Fix: read the version from axe-cli's own chromedriver package.json.
        # 3. Sandbox crash: ChromeDriver hard-codes /opt/google/chrome/chrome as the
        #    Chrome binary path — it never uses PATH. Previous fix wrote a wrapper to
        #    /usr/local/bin which ChromeDriver silently ignored. Fix: overwrite
        #    /opt/google/chrome/chrome itself with a wrapper that injects --no-sandbox
        #    and --disable-dev-shm-usage before exec-ing the Chrome for Testing binary.
        run: |
          npm i -g @axe-core/cli@4.11.3

          # Read ChromeDriver version from axe-cli's own bundled package, not system
          AXE_ROOT=$(npm root -g)/@axe-core/cli/node_modules
          CD_MAJOR=$(node -p "require('$AXE_ROOT/chromedriver/package.json').version.split('.')[0]" 2>/dev/null \
            || node -p "require('$(npm root -g)/chromedriver/package.json').version.split('.')[0]" 2>/dev/null \
            || echo "150")
          echo "axe-cli ChromeDriver major: $CD_MAJOR"

          CfT_URL=$(curl -sf \
            https://googlechromelabs.github.io/chrome-for-testing/known-good-versions-with-downloads.json \
            | jq -r --argjson m "$CD_MAJOR" \
              '[.versions[] | select((.version|split(".")[0]|tonumber)==$m)] | sort_by(.version|split(".")|map(tonumber)) | last | .downloads.chrome[] | select(.platform=="linux64") | .url' \
            | head -1)
          [ -z "$CfT_URL" ] && { echo "::error::No Chrome for Testing found for major $CD_MAJOR"; exit 1; }
          echo "Fetching: $CfT_URL"
          wget -q "$CfT_URL" -O /tmp/chrome-cft.zip
          unzip -q /tmp/chrome-cft.zip -d /tmp/chrome-cft
          CfT_BIN=$(find /tmp/chrome-cft -name "chrome" -type f | head -1)
          chmod +x "$CfT_BIN"

          # Overwrite /opt/google/chrome/chrome — the hard-coded path ChromeDriver uses.
          # The wrapper exec's the CfT binary with --no-sandbox (required in CI containers).
          printf '#!/bin/bash\nexec "%s" --no-sandbox --disable-dev-shm-usage "$@"\n' "$CfT_BIN" \
            | sudo tee /opt/google/chrome/chrome > /dev/null
          sudo chmod +x /opt/google/chrome/chrome
          echo "Chrome ready: $(google-chrome --version)"

          python3 -m http.server 3000 --directory frontend/ &
          SERVER_PID=$!
          echo "Waiting for server on :3000 ..."
          for i in $(seq 1 15); do
            curl -sf http://localhost:3000/ > /dev/null 2>&1 && echo "Server ready (attempt $i)" && break
            sleep 2
          done
          npx @axe-core/cli http://localhost:3000/ --exit || \
            { kill $SERVER_PID 2>/dev/null; echo "::error::Accessibility violations found"; exit 1; }
          kill $SERVER_PID 2>/dev/null
          echo "Accessibility check passed"

  # ── Lighthouse performance gate (required) ───────────────────────────────
  lighthouse:
    name: Lighthouse CI (mobile)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: "24" }
      - name: Run Lighthouse CI against local build
        # Uses Python's built-in HTTP server — no serve package, no version drift.
        # Curl health-check loop guarantees server is up before lhci runs.
        # lighthouserc.json: 3 runs / median / no-upload for stable results.
        run: |
          npm i -g @lhci/cli
          python3 -m http.server 3000 --directory frontend/ &
          SERVER_PID=$!
          echo "Waiting for server on :3000 ..."
          for i in $(seq 1 15); do
            curl -sf http://localhost:3000/ > /dev/null 2>&1 && echo "Server ready (attempt $i)" && break
            sleep 2
          done
          lhci autorun --config=lighthouserc.json || \
            { kill $SERVER_PID 2>/dev/null; echo "::error::Lighthouse budget not met"; exit 1; }
          kill $SERVER_PID 2>/dev/null
          echo "✅ Lighthouse CI passed"

  # ── E2E smoke (required) ─────────────────────────────────────────────────
  e2e:
    name: E2E Smoke (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: "24" }
      - name: Playwright smoke
        run: |
          npm i -D @playwright/test
          npx playwright install --with-deps chromium
          npx playwright test tests/e2e --reporter=line || \
            { echo "::error::E2E smoke failed"; exit 1; }

  # ── Worker bundle-size gate (required) ───────────────────────────────────
  # Closes risk R-13: the Worker bundle (1.32 MB gzip at gate introduction) is
  # capped by Cloudflare at 3 MB gzip — silent growth past that ceiling would
  # make production undeployable. Fail the gate at 2.5 MB gzip so the trend is
  # caught with headroom to react.
  bundle-size:
    name: Worker Bundle Size Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults: { run: { working-directory: workers } }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: "24", cache: "npm", cache-dependency-path: workers/package-lock.json }
      - run: npm ci || npm install
      - name: Build bundle (wrangler dry-run) and enforce the gzip ceiling
        run: |
          npx wrangler deploy --dry-run --outdir /tmp/bundle-check
          raw=$(wc -c < /tmp/bundle-check/index.js)
          gz=$(gzip -c /tmp/bundle-check/index.js | wc -c)
          limit=2621440   # 2.5 MiB gate
          cf_cap=3145728  # Cloudflare hard cap (3 MiB gzip)
          pct=$(( gz * 100 / cf_cap ))
          echo "Bundle: raw ${raw} bytes · gzip ${gz} bytes (${pct}% of the Cloudflare 3 MiB cap)"
          {
            echo "## Worker bundle size"
            echo "- gzip: **${gz} bytes** (${pct}% of Cloudflare's 3 MiB cap; gate at 2.5 MiB)"
            echo "- raw: ${raw} bytes"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$gz" -gt "$limit" ]; then
            echo "::error::Worker bundle ${gz} bytes gzip exceeds the 2.5 MiB gate — prune before it hits Cloudflare's 3 MiB deploy cap (risk R-13)."
            exit 1
          fi
