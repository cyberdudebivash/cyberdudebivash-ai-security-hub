name: Enterprise Release Gate

# Manual-only, read-mostly end-to-end integration check across backend API,
# frontend, security boundaries, and the real customer scan golden path.
# Does not run on push/PR — triggered on demand ahead of a customer release.
on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "Base URL to test against"
        required: false
        default: "https://cyberdudebivash.in"

jobs:
  release-gate:
    name: Run enterprise release gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Run enterprise release gate
        run: node scripts/enterprise-release-gate.mjs "${{ github.event.inputs.target_url }}"
