# в”Ђв”Ђ KV Namespace в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Already live: npx wrangler kv:namespace create SECURITY_HUB_KV
[[kv_namespaces]]
binding = "SECURITY_HUB_KV"
id      = "95faae90943f43afa26d552b8385d339"

# в”Ђв”Ђ D1 Database в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Setup:  npx wrangler d1 create cyberdudebivash-security-hub
#         npx wrangler d1 execute cyberdudebivash-security-hub --file=./schema.sql
# Replace database_id below with output of the create command

[[d1_databases]]
binding = "SECURITY_HUB_DB"
database_name = "cyberdudebivash-security-hub"
database_id = "239a35c8-393f-488e-a7e0-30c7fde958fa"

# в”Ђв”Ђ R2 Bucket (scan result storage) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Setup:  npx wrangler r2 bucket create cyberdudebivash-scan-results
[[r2_buckets]]
binding     = "SCAN_RESULTS"
bucket_name = "cyberdudebivash-scan-results"

# в”Ђв”Ђ Cloudflare Queues в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Setup:  npx wrangler queues create scan-jobs
#         npx wrangler queues create scan-jobs-dlq
[[queues.producers]]
queue   = "scan-jobs"
binding = "SCAN_QUEUE"

[[queues.consumers]]
queue              = "scan-jobs"
max_batch_size     = 10        # process up to 10 jobs per batch
max_batch_timeout  = 30        # wait up to 30s to fill batch
max_retries        = 3
dead_letter_queue  = "scan-jobs-dlq"

