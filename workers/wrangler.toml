name               = "cyberdudebivash-security-hub"
main               = "src/index.js"
compatibility_date = "2024-01-01"
account_id         = "055c68d5d664747ff6c9e1093cd9673f"

[vars]
ENVIRONMENT = "production"
APP_NAME    = "CYBERDUDEBIVASH AI Security Hub"
VERSION     = "8.0.0"
WEBSITE     = "https://cyberdudebivash.in"
TOOLS_URL   = "https://tools.cyberdudebivash.com"
TELEGRAM    = "https://t.me/cyberdudebivashSentinelApex"
CONTACT     = "bivash@cyberdudebivash.com"

# ── KV Namespace ──────────────────────────────────────────────────────────────
# Already live: npx wrangler kv:namespace create SECURITY_HUB_KV
[[kv_namespaces]]
binding = "SECURITY_HUB_KV"
id      = "95faae90943f43afa26d552b8385d339"

# ── D1 Database ───────────────────────────────────────────────────────────────
# Setup:  npx wrangler d1 create cyberdudebivash-security-hub
#         npx wrangler d1 execute cyberdudebivash-security-hub --file=./schema.sql
# Replace database_id below with output of the create command
[[d1_databases]]
binding      = "DB"
database_name = "cyberdudebivash-security-hub"
database_id  = "239a35c8-393f-488e-a7e0-30c7fde958fa"

# ── R2 Bucket (scan result storage) ──────────────────────────────────────────
# Setup:  npx wrangler r2 bucket create cyberdudebivash-scan-results
[[r2_buckets]]
binding     = "SCAN_RESULTS"
bucket_name = "cyberdudebivash-scan-results"

# ── Cloudflare Queues ─────────────────────────────────────────────────────────
# Setup:  npx wrangler queues create scan-jobs
#         npx wrangler queues create scan-jobs-dlq
[[queues.producers]]
queue   = "scan-jobs"
binding = "SCAN_QUEUE"

[[queues.consumers]]
queue              = "scan-jobs"
max_batch_size     = 10        # process up to 10 jobs per batch
max_batch_timeout  = 30        # wait up to 30s to fill batch
max_retries        = 3
dead_letter_queue  = "scan-jobs-dlq"

# ── Secrets (set via: npx wrangler secret put SECRET_NAME) ───────────────────
# Required secrets:
#   JWT_SECRET                — 64+ char random string (openssl rand -hex 32)
#   RAZORPAY_KEY_ID           — Razorpay API key ID (rzp_live_... or rzp_test_...)
#   RAZORPAY_KEY_SECRET       — Razorpay API key secret (paired with KEY_ID)
#   RAZORPAY_WEBHOOK_SECRET   — from Razorpay dashboard webhook settings
#   TELEGRAM_BOT_TOKEN        — from @BotFather
#   ADMIN_TELEGRAM_CHAT_ID    — your admin Telegram chat ID
#   SENTINEL_CHANNEL_ID       — Sentinel APEX channel ID (for CVE broadcasts)
#
# V8.0 new secrets:
#   LINKEDIN_ACCESS_TOKEN     — Optional: LinkedIn API v2 access token (for auto-posting)
#   WORKERS_AI_ACCOUNT_ID     — Optional: Cloudflare account ID for Workers AI binding
#
# V7.0 monetization setup (Razorpay):
#   1. Create an account at https://razorpay.com
#   2. Generate API keys in Settings → API Keys
#   3. npx wrangler secret put RAZORPAY_KEY_ID
#   4. npx wrangler secret put RAZORPAY_KEY_SECRET
#   5. Set up webhook in Razorpay dashboard → Webhooks (payment.captured, payment.failed)
#   6. npx wrangler secret put RAZORPAY_WEBHOOK_SECRET
#
# One-liner to generate JWT_SECRET:
#   openssl rand -hex 32 | npx wrangler secret put JWT_SECRET

# ── Workers AI (optional — enhances AI Cyber Brain narratives) ────────────────
# Uncomment to enable Cloudflare AI (Workers AI addon required):
# [ai]
# binding = "AI"

# ── Cron Triggers ─────────────────────────────────────────────────────────────
# V8.0 cron schedule:
#   Every 6 hours  — Sentinel APEX CVE feed refresh + monitoring scans (hourly monitors)
#   Every hour     — Continuous monitoring scans (all due monitors)
# Note: Cloudflare Workers supports multiple cron expressions
[triggers]
crons = [
  "0 * * * *",        # Hourly: run due monitoring scans + threat intel purge
  "0 0,6,12,18 * * *" # 4x/day: Sentinel APEX CVE feed refresh
]

