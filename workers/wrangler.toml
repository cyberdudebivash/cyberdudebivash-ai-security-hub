[ai]
binding = "AI"

# ── Cron Triggers ─────────────────────────────────────────────────────────────
# v13.0 cron schedule — 5 entries. NOTE (2026-07-24): this comment previously
# claimed a "Cloudflare Free plan hard limit: 5" — confirmed stale. Account
# owner confirmed the account is on Workers Paid (Bundled/Unbound), not Free;
# see docs/OPERATIONAL_RISK_REGISTER.md R-09 for the evidence trail. 5 is
# retained because it matches the current pipeline design below, not because
# of a plan-imposed cap — Workers Paid does not carry the Free tier's 5-cron
# ceiling or its tighter subrequest/CPU limits.
#
# Engine execution per trigger (all v12 engines run on every scheduled event):
#   runAnomalyBatch()  — unconditional on every cron invocation → hourly via slot 1
#   consumeEvents()    — unconditional on every cron invocation → hourly via slot 1
#   runPredictiveBatch()— cron==='0 * * * *' condition → hourly via slot 1
#   runPatchingBatch() — unconditional on every cron invocation
#   runGodModeCron()   — cron==='0 */6 * * *' || cron==='0 6 * * *' → slots 3+4
#   runMythosCron()    — cron==='0 */12 * * *' → legacy fallback (now superseded by God Mode)
#
#   Slot 1: Hourly    — v12 Anomaly + Predictive + Agent Bus + Monitoring + Purge
#   Slot 2: 4x/day   — Sentinel APEX CVE feed refresh
#   Slot 3: Every 6h  — MYTHOS GOD MODE v4.0 (12-phase full platform sweep)
#   Slot 4: 6 AM      — v10 Content pipeline + MYTHOS GOD MODE daily run
#   Slot 5: 11 PM     — v10 Daily revenue snapshot
[triggers]
crons = [
  "0 * * * *",         # Slot 1 — Hourly:    v12 Anomaly + Predictive + Agent Bus + Monitoring
  "0 0,6,12,18 * * *", # Slot 2 — 4x/day:   Sentinel APEX CVE feed refresh
  "0 */6 * * *",       # Slot 3 — Every 6h:  MYTHOS GOD MODE v4.0 full 12-phase autonomous run
  "0 6 * * *",         # Slot 4 — 6 AM:      v10 Content pipeline + MYTHOS daily run
  "0 23 * * *"         # Slot 5 — 11 PM:     v10 Daily revenue snapshot
]

# ── Custom domain route ───────────────────────────────────────────────────────
# IMPORTANT: Route cyberdudebivash.in/api/* is managed via the Cloudflare
# dashboard (Workers & Pages → cyberdudebivash-security-hub → Routes).
# DO NOT add a [[routes]] block here — the CLOUDFLARE_API_TOKEN used in CI
# does not have Zone:Workers Routes:Edit permission, and Wrangler will fail
# trying to call /zones/{id}/workers/routes after a successful worker upload.
# The dashboard-configured route is permanent and does not need re-registration.
