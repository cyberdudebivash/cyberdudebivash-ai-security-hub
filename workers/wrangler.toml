name            = "cyberdudebivash-security-hub"
main            = "src/index.js"
compatibility_date = "2024-01-01"
account_id      = "${CLOUDFLARE_ACCOUNT_ID}"

[vars]
ENVIRONMENT = "production"
APP_NAME    = "CYBERDUDEBIVASH AI Security Hub"
VERSION     = "2.0.0"

# Cloudflare KV namespace for rate limiting + usage tracking
# Run: npx wrangler kv:namespace create SECURITY_HUB_KV
# Then replace the id below with the output id
[[kv_namespaces]]
binding = "SECURITY_HUB_KV"
id      = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

[triggers]
crons = []

# Routes — set after deploying Pages for the frontend
# [[routes]]
# pattern = "cyberdudebivash.in/api/*"
# zone_name = "cyberdudebivash.in"
