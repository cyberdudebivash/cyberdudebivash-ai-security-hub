name               = "cyberdudebivash-security-hub"
main               = "src/index.js"
compatibility_date = "2024-01-01"
# account_id is intentionally omitted — injected at deploy time via CLOUDFLARE_ACCOUNT_ID env var

[vars]
ENVIRONMENT = "production"
APP_NAME    = "CYBERDUDEBIVASH AI Security Hub"
VERSION     = "30.0.0"
PLATFORM_VERSION = "30.0.0"
COMMIT          = "INJECT_AT_BUILD"
WEBSITE     = "https://cyberdudebivash.in"
TOOLS_URL   = "https://tools.cyberdudebivash.com"
TELEGRAM    = "https://t.me/cyberdudebivashSentinelApex"
CONTACT     = "bivash@cyberdudebivash.com"
# ── MYTHOS Admin Key (rotate via: wrangler secret put ADMIN_KEY) ─────────────

# ── KV Namespace ──────────────────────────────────────────────────────────────
# Already live: npx wrangler kv:namespace create SECURITY_HUB_KV
[[kv_namespaces]]
binding = "SECURITY_HUB_KV"
id      = "95faae90943f43afa26d552b8385d339"

# ── D1 Database ───────────────────────────────────────────────────────────────
# Setup:  npx wrangler d1 create cyberdudebivash-security-hub
#
# IMPORTANT: Use schema_master.sql for complete schema (198 tables, idempotent):
#   npx wrangler d1 execute cyberdudebivash-security-hub --remote --file=./schema_master.sql
#
# For incremental migrations only:
#   npx wrangler d1 execute cyberdudebivash-security-hub --remote --file=./schema_v38_governor.sql
#
# Legacy (base schema only — 13 tables):
#   npx wrangler d1 execute cyberdudebivash-security-hub --remote --file=./schema.sql

[[d1_databases]]
binding = "SECURITY_HUB_DB"
database_name = "cyberdudebivash-security-hub"
database_id = "239a35c8-393f-488e-a7e0-30c7fde958fa"

# ── R2 Bucket (scan result storage) ──────────────────────────────────────────
# Setup:  npx wrangler r2 bucket create cyberdudebivash-scan-results
[[r2_buckets]]
binding     = "SCAN_RESULTS"
bucket_name = "cyberdudebivash-scan-results"

# ── Cloudflare Queues ─────────────────────────────────────────────────────────
# Setup:  npx wrangler queues create scan-jobs
#         npx wrangler queues create scan-jobs-dlq
[[queues.producers]]
queue   = "scan-jobs"
binding = "SCAN_QUEUE"

[[queues.consumers]]
queue              = "scan-jobs"
max_batch_size     = 10        # process up to 10 jobs per batch
max_batch_timeout  = 30        # wait up to 30s to fill batch
max_retries        = 3
dead_letter_queue  = "scan-jobs-dlq"

# ── Secrets (set via: npx wrangler secret put SECRET_NAME) ───────────────────
#
# ════════════════════════════════════════════════════════════════════════════════
# COMPLETE SECRET MANIFEST — Run ALL of these before going live
# ════════════════════════════════════════════════════════════════════════════════
#
# ── CORE PLATFORM (REQUIRED — platform won't start without these) ─────────────
#   JWT_SECRET                — 64+ char random string
#                               Generate: openssl rand -hex 32 | npx wrangler secret put JWT_SECRET
#   ADMIN_KEY                 — Admin dashboard access key
#                               Generate: openssl rand -hex 32 | npx wrangler secret put ADMIN_KEY
#   SCAN_TOKEN_SECRET         — Scan token signing key (scanTokenEngine)
#                               Generate: openssl rand -hex 32 | npx wrangler secret put SCAN_TOKEN_SECRET
#   ANTHROPIC_API_KEY         — Anthropic API key (sk-ant-...)
#                               Get: https://console.anthropic.com → API Keys → Create
#                               Run: npx wrangler secret put ANTHROPIC_API_KEY
#                               Without this key: falls back to Cloudflare Workers AI (llama-3-8b)
#                               Model routing:
#                                 ENTERPRISE → claude-opus-4-8
#                                 PRO        → claude-sonnet-4-6
#                                 FREE       → claude-haiku-4-5-20251001
#
# ── PAYMENTS (REQUIRED for revenue) ──────────────────────────────────────────
#   STRIPE_SECRET_KEY         — Stripe API key (sk_live_... or sk_test_...)
#                               Get: https://dashboard.stripe.com → Developers → API Keys
#                               Run: npx wrangler secret put STRIPE_SECRET_KEY
#   STRIPE_WEBHOOK_SECRET     — Stripe webhook signing secret (whsec_...)
#                               Webhook URL: https://cyberdudebivash.in/api/webhooks/stripe
#                               Events: checkout.session.completed, payment_intent.succeeded,
#                                       customer.subscription.created, customer.subscription.deleted
#                               Run: npx wrangler secret put STRIPE_WEBHOOK_SECRET
#   RAZORPAY_KEY_ID           — Razorpay API key ID (rzp_live_... or rzp_test_...)
#                               Run: npx wrangler secret put RAZORPAY_KEY_ID
#   RAZORPAY_KEY_SECRET       — Razorpay API key secret
#                               Run: npx wrangler secret put RAZORPAY_KEY_SECRET
#   RAZORPAY_WEBHOOK_SECRET   — from Razorpay dashboard webhook settings
#                               Run: npx wrangler secret put RAZORPAY_WEBHOOK_SECRET
#
# ── NOTIFICATIONS (REQUIRED for alerts) ──────────────────────────────────────
#   TELEGRAM_BOT_TOKEN        — from @BotFather for CVE alerts + admin notifications
#                               Run: npx wrangler secret put TELEGRAM_BOT_TOKEN
#   TELEGRAM_CHANNEL_ID       — Your Telegram channel ID (e.g. @cyberdudebivash or -100xxxxxxxx)
#                               Run: npx wrangler secret put TELEGRAM_CHANNEL_ID
#   ADMIN_TELEGRAM_CHAT_ID    — Your admin Telegram chat ID
#                               Run: npx wrangler secret put ADMIN_TELEGRAM_CHAT_ID
#   SENTINEL_CHANNEL_ID       — Sentinel APEX channel ID (for CVE broadcasts)
#                               Run: npx wrangler secret put SENTINEL_CHANNEL_ID
#   RESEND_API_KEY            — Email provider (resend.com free tier: 3,000/mo)
#                               Get: https://resend.com → API Keys → Create
#                               Verify domain cyberdudebivash.in in Resend dashboard first
#                               Run: npx wrangler secret put RESEND_API_KEY
#   SLACK_WEBHOOK             — Slack incoming webhook URL for security alerts
#                               Get: https://api.slack.com/apps → Incoming Webhooks → Add
#                               Run: npx wrangler secret put SLACK_WEBHOOK
#   ENTERPRISE_WEBHOOK_URL    — Enterprise customer webhook for alert delivery
#                               Run: npx wrangler secret put ENTERPRISE_WEBHOOK_URL
#
# ── THREAT INTELLIGENCE (REQUIRED for full CTI capability) ───────────────────
#   VIRUSTOTAL_API_KEY        — VirusTotal API key for IOC enrichment + malware scanning
#                               Get: https://www.virustotal.com/gui/my-apikey
#                               Run: npx wrangler secret put VIRUSTOTAL_API_KEY
#   NVD_API_KEY               — NVD NIST API key (higher rate limits: 50 req/30s vs 5/30s)
#                               Get: https://nvd.nist.gov/developers/request-an-api-key
#                               Run: npx wrangler secret put NVD_API_KEY
#   ABUSEIPDB_API_KEY         — AbuseIPDB key for IP reputation + bot blocking
#                               Get: https://www.abuseipdb.com/account/api
#                               Run: npx wrangler secret put ABUSEIPDB_API_KEY
#   SENTINEL_API_KEY          — Sentinel APEX internal API key for cross-service auth
#                               Generate: openssl rand -hex 32 | npx wrangler secret put SENTINEL_API_KEY
#
# ── GROWTH & AUTOMATION (OPTIONAL) ───────────────────────────────────────────
#   LINKEDIN_ACCESS_TOKEN     — LinkedIn API v2 OAuth token for auto-posting
#                               Get: https://developer.linkedin.com → OAuth 2.0
#                               Run: npx wrangler secret put LINKEDIN_ACCESS_TOKEN
#   LINKEDIN_ORG_ID           — LinkedIn organization ID for company page posting
#                               Run: npx wrangler secret put LINKEDIN_ORG_ID
#   GUMROAD_SELLER_ID         — Gumroad seller ID (from gumroad.com/settings/advanced)
#                               Run: npx wrangler secret put GUMROAD_SELLER_ID
#   CRON_SECRET               — Secret to authenticate internal cron-triggered endpoints
#                               Generate: openssl rand -hex 32 | npx wrangler secret put CRON_SECRET
#
# ── CI/CD (REQUIRED for GitHub Actions health checks) ────────────────────────
#   WORKERS_API_KEY           — Internal CI/monitoring API key
#                               Generate: openssl rand -hex 32
#                               Run: npx wrangler secret put WORKERS_API_KEY
#                               Add to GitHub Secrets: Settings → Secrets → WORKERS_API_KEY
#
# ════════════════════════════════════════════════════════════════════════════════
# QUICK SETUP — paste into terminal to set all core secrets at once:
#   openssl rand -hex 32 | npx wrangler secret put JWT_SECRET
#   openssl rand -hex 32 | npx wrangler secret put ADMIN_KEY
#   openssl rand -hex 32 | npx wrangler secret put SCAN_TOKEN_SECRET
#   openssl rand -hex 32 | npx wrangler secret put SENTINEL_API_KEY
#   openssl rand -hex 32 | npx wrangler secret put CRON_SECRET
#   openssl rand -hex 32 | npx wrangler secret put WORKERS_API_KEY
# ════════════════════════════════════════════════════════════════════════════════

# ── Workers AI (optional — enhances AI Cyber Brain narratives) ────────────────
# Enabled in v8.1 — requires Workers AI addon in Cloudflare dashboard
# If you do NOT have the addon, comment these 2 lines out again.
[ai]
binding = "AI"

# ── Cron Triggers ─────────────────────────────────────────────────────────────
# v13.0 cron schedule — EXACTLY 5 entries (Cloudflare Free plan hard limit: 5)
#
# Engine execution per trigger (all v12 engines run on every scheduled event):
#   runAnomalyBatch()  — unconditional on every cron invocation → hourly via slot 1
#   consumeEvents()    — unconditional on every cron invocation → hourly via slot 1
#   runPredictiveBatch()— cron==='0 * * * *' condition → hourly via slot 1
#   runPatchingBatch() — unconditional on every cron invocation
#   runGodModeCron()   — cron==='0 */6 * * *' || cron==='0 6 * * *' → slots 3+4
#   runMythosCron()    — cron==='0 */12 * * *' → legacy fallback (now superseded by God Mode)
#
#   Slot 1: Hourly    — v12 Anomaly + Predictive + Agent Bus + Monitoring + Purge
#   Slot 2: 4x/day   — Sentinel APEX CVE feed refresh
#   Slot 3: Every 6h  — MYTHOS GOD MODE v4.0 (12-phase full platform sweep)
#   Slot 4: 6 AM      — v10 Content pipeline + MYTHOS GOD MODE daily run
#   Slot 5: 11 PM     — v10 Daily revenue snapshot
[triggers]
crons = [
  "0 * * * *",         # Slot 1 — Hourly:    v12 Anomaly + Predictive + Agent Bus + Monitoring
  "0 0,6,12,18 * * *", # Slot 2 — 4x/day:   Sentinel APEX CVE feed refresh
  "0 */6 * * *",       # Slot 3 — Every 6h:  MYTHOS GOD MODE v4.0 full 12-phase autonomous run
  "0 6 * * *",         # Slot 4 — 6 AM:      v10 Content pipeline + MYTHOS daily run
  "0 23 * * *"         # Slot 5 — 11 PM:     v10 Daily revenue snapshot
]

